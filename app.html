<script type="text/babel">
const{useState,useEffect,useCallback,useMemo,useRef}=React;

/* ── Settings ──────────────────────────────────────────────────────────── */
const DEF_CFG={temSocio:true,socioNome:'Sócio',socioPct:30,taxaAtraso:0,valorFixoDia:0};
const loadCfg=()=>{try{return{...DEF_CFG,...JSON.parse(localStorage.getItem('bpx_cfg')||'{}')};}catch{return{...DEF_CFG};}};

const SALE_SOUND_URL='/assets/audio/Shopify%20Sales%20Sound%20Effect%20_%20NO%20COPYRIGHT%20%F0%9F%8E%A4%F0%9F%8E%B6.mp3';

/* ── Helpers ────────────────────────────────────────────────────────────── */
const R$=v=>new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}).format(v||0);
const uid=()=>Math.random().toString(36).slice(2)+Date.now().toString(36);
const today=()=>new Date().toISOString().slice(0,10);
const daysLeft=d=>d?Math.ceil((new Date(d+'T00:00:00')-new Date().setHours(0,0,0,0))/86400000):0;
const daysDiff=(a,b)=>a&&b?Math.ceil((new Date(b+'T00:00:00')-new Date(a+'T00:00:00'))/86400000):0;
const addDays=(d,n)=>{const dt=new Date(d+'T00:00:00');dt.setDate(dt.getDate()+n);return dt.toISOString().slice(0,10);};
const fmtCPF=v=>{const d=v.replace(/\D/g,'').slice(0,11);if(d.length<=3)return d;if(d.length<=6)return`${d.slice(0,3)}.${d.slice(3)}`;if(d.length<=9)return`${d.slice(0,3)}.${d.slice(3,6)}.${d.slice(6)}`;return`${d.slice(0,3)}.${d.slice(3,6)}.${d.slice(6,9)}-${d.slice(9)}`;};
const fmtPhone=v=>{const d=v.replace(/\D/g,'').slice(0,11);if(!d.length)return'';if(d.length<=2)return`(${d}`;if(d.length<=6)return`(${d.slice(0,2)}) ${d.slice(2)}`;if(d.length<=10)return`(${d.slice(0,2)}) ${d.slice(2,6)}-${d.slice(6)}`;return`(${d.slice(0,2)}) ${d.slice(2,7)}-${d.slice(7)}`;};
const exportCSV=rows=>{if(!rows.length)return;const h='Nome,CPF,Emprestado,Retorno,Taxa,Inicio,Vencimento,Status,Pedaladas';const b=rows.map(c=>`"${c.nome}","${c.cpf}",${c.valorEmprestado},${c.valorRetorno},${c.taxaServico}%,${c.dataInicio},${c.dataVencimento},"${c.pago?'Pago':'Ativo'}",${c.pedaladas||0}`).join('\n');const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(h+'\n'+b);a.download='contratos.csv';a.click();};
const validateCPF=cpf=>{const d=cpf.replace(/\D/g,'');if(d.length!==11||/^(\d)\1+$/.test(d))return false;let s=0;for(let i=0;i<9;i++)s+=+d[i]*(10-i);let r=(s*10)%11;if(r>=10)r=0;if(r!==+d[9])return false;s=0;for(let i=0;i<10;i++)s+=+d[i]*(11-i);r=(s*10)%11;if(r>=10)r=0;return r===+d[10];};

const calcFin=(c,cfg)=>{
  const lucro=(c.valorRetorno||0)-(c.valorEmprestado||0)+(c.jurosAtraso||0);
  const pct=cfg?.temSocio?(cfg.socioPct||0):0;
  const socio=lucro*(pct/100);
  return{lucro,socio,liquido:lucro-socio};
};
const calcJurosAtraso=(c,cfg)=>{
  const dias=Math.max(0,-daysLeft(c.dataVencimento));
  if(!dias)return 0;
  
  // Valor fixo por dia + taxa percentual
  const valorFixoTotal=(cfg?.valorFixoDia||0)*dias;
  const taxaPercentual=(cfg?.taxaAtraso||0)/100;
  const valorTaxaPercentual=(c.valorRetorno||0)*taxaPercentual*dias;
  
  return valorFixoTotal+valorTaxaPercentual;
};

const downloadReciboTitulo=(contract,cfg)=>{
  const fin=calcFin(contract,cfg);

  const venc=new Date(contract.dataVencimento+'T00:00:00').toLocaleDateString('pt-BR');
  const inicio=contract.dataInicio?new Date(contract.dataInicio+'T00:00:00').toLocaleDateString('pt-BR'):'—';
  const spreadBruto=fin.lucro;
  const spreadLiquido=fin.liquido;
  const socio=fin.socio;
  const socioLine=(cfg?.temSocio&&socio>0)?`<div class="row"><div class="k">Participação (${cfg.socioNome||'Sócio'})</div><div class="v">${R$(socio)}</div></div>`:'';

  const html=`<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Recibo de Formalização</title>
  <style>
    :root{--bg:#0b0a09;--card:#111110;--line:rgba(255,255,255,.10);--muted:rgba(255,255,255,.70);--txt:#ffffff;--petrol:#0ea5e9;--gold:#c8a24a;--emerald:#34d399;}

    .wrap{max-width:820px;margin:22px auto;padding:0 16px}
    .card{background:linear-gradient(180deg,rgba(17,17,16,.96),rgba(10,10,10,.96));border:1px solid var(--line);border-radius:20px;overflow:hidden;box-shadow:0 18px 60px rgba(0,0,0,.55)}
    .top{padding:18px 20px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;gap:14px;align-items:flex-start}
    .ttl{font-weight:900;letter-spacing:-.02em;font-size:16px}
    .sub{margin-top:4;color:var(--muted);font-size:12px;line-height:1.4}
    .meta{color:var(--muted);font-size:12px;line-height:1.5;text-align:right}
    .body{padding:18px 20px}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .row{border:1px solid var(--line);border-radius:14px;padding:12px 12px;background:rgba(0,0,0,.22)}
    .k{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.10em;margin-bottom:6px}
    .v{font-size:14px;font-weight:800;color:var(--txt);word-break:break-word}
    .amt{font-size:18px;font-weight:900;letter-spacing:-.02em}
    .petrol{color:var(--petrol)}
    .emerald{color:var(--emerald)}
    .gold{color:var(--gold)}
    .btns{margin-top:14px;display:flex;gap:10px;flex-wrap:wrap}
    .btn{border:1px solid var(--line);background:transparent;color:var(--txt);border-radius:12px;padding:10px 12px;font-weight:800;cursor:pointer}
    .btnp{border:1px solid rgba(14,165,233,.35);background:rgba(14,165,233,.16)}
    @media print{.btns{display:none}.wrap{margin:0;max-width:none}.card{box-shadow:none}}
  </style></head><body>
  <div class="wrap">
    <div class="card">
      <div class="top">
        <div>
          <div class="ttl">Emissão de Título Confirmada</div>
          <div class="sub">O ativo foi devidamente registrado e integrado à sua carteira de gestão.</div>
        </div>
        <div class="meta"><div>Emitido em: ${emitidoEm}</div><div>Protocolo: ${protocolo}</div></div>
      </div>
      <div class="body">
        <div class="grid">
          <div class="row"><div class="k">Contraparte (Devedor Qualificado)</div><div class="v">${String(contract.nome||'—').replaceAll('<','&lt;')}</div></div>
          <div class="row"><div class="k">ID do Título</div><div class="v">${String(contract.id||'—').replaceAll('<','&lt;')}</div></div>
          <div class="row"><div class="k">Data de Emissão</div><div class="v">${inicio}</div></div>
          <div class="row"><div class="k">Data de Exigibilidade</div><div class="v">${venc}</div></div>
          <div class="row"><div class="k">Valor Nominal</div><div class="v amt">${R$(contract.valorEmprestado)}</div></div>
          <div class="row"><div class="k">Montante de Liquidação</div><div class="v amt petrol">${R$(contract.valorRetorno)}</div></div>
          <div class="row"><div class="k">Projeção de Spread (Bruto)</div><div class="v amt gold">${R$(spreadBruto)}</div></div>
          <div class="row"><div class="k">Projeção de Spread (Líquido)</div><div class="v amt emerald">${R$(spreadLiquido)}</div></div>
          ${socioLine}
        </div>
        <div class="btns">
          <button class="btn btnp" onclick="window.print()">Salvar / Imprimir (PDF)</button>
          <button class="btn" onclick="window.close()">Fechar</button>
        </div>
      </div>
    </div>
  </div>
  </body></html>`;

  const blob=new Blob([html],{type:'text/html;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  window.open(url,'_blank','noopener,noreferrer');
  setTimeout(()=>URL.revokeObjectURL(url),8000);
};

const normCPF=v=>(v||'').replace(/\D/g,'').slice(0,11);

const buildRatingIndex=contracts=>{
  const byCpf=new Map();
  for(const c of contracts){
    const cpf=normCPF(c.cpf);
    if(!cpf)continue;
    if(!byCpf.has(cpf))byCpf.set(cpf,[]);
    byCpf.get(cpf).push(c);
  }

  const idx=new Map();
  for(const [cpf,list] of byCpf.entries()){
    let paid=0,onTime=0,minorLate=0,majorLate=0;
    let openLateMax=0;
    for(const c of list){
      if(c.pago){
        paid++;
        const payDate=c.pagoEm||c.dataVencimento||today();
        const d=daysDiff(c.dataVencimento,payDate);
        if(d<=0)onTime++;
        else if(d<=3)minorLate++;
        else majorLate++;
      }else{
        openLateMax=Math.max(openLateMax,Math.max(0,-daysLeft(c.dataVencimento)));
      }
    }

    let rating='—',risco='—';
    if(openLateMax>=15){rating='D';risco='Alto';}
    else if(openLateMax>=4||majorLate>0){rating='C';risco='Médio';}
    else if(minorLate>0){rating='B';risco='Médio';}
    else if(paid>=2&&onTime===paid){rating='A';risco='Baixo';}
    else if(paid===1&&onTime===1){rating='B';risco='Baixo';}

    idx.set(cpf,{rating,risco,paid,onTime,minorLate,majorLate,openLateMax});
  }
  return idx;
};

};

/* ── Sound & Confetti ───────────────────────────────────────────────────── */
const playSuccess=()=>{try{const ctx=new(window.AudioContext||window.webkitAudioContext)();const play=(f,s,d,v=.28)=>{const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=f;g.gain.setValueAtTime(v,ctx.currentTime+s);g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+s+d);o.start(ctx.currentTime+s);o.stop(ctx.currentTime+s+d);};play(523,0,.12);play(659,.1,.12);play(784,.2,.15);play(1047,.32,.45,.35);}catch(e){}};
const playNotify=()=>{try{const ctx=new(window.AudioContext||window.webkitAudioContext)();const t=ctx.currentTime;const mk=(f,dt,dur,v)=>{const o=ctx.createOscillator(),g=ctx.createGain();o.type='triangle';o.frequency.setValueAtTime(f,t+dt);g.gain.setValueAtTime(0.0001,t+dt);g.gain.exponentialRampToValueAtTime(v,t+dt+.01);g.gain.exponentialRampToValueAtTime(0.0001,t+dt+dur);o.connect(g);g.connect(ctx.destination);o.start(t+dt);o.stop(t+dt+dur+.02);};mk(880,0,.14,.16);mk(1175,.11,.16,.14);mk(1568,.22,.18,.12);}catch(e){}};
const playSaleSound=url=>{
  try{
    const src=(url||'').trim();
    if(!src){return;}
    const a=new Audio(src);
    a.loop=false;
    a.volume=0.9;
    a.play().catch(()=>{});
  }catch(e){
    
  }
};
const launchConfetti=canvas=>{const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const cols=['#3b82f6','#10b981','#ff9f0a','#7c3aed','#ff453a','#fff','#ffd60a'];const pts=Array.from({length:80},()=>({x:Math.random()*canvas.width,y:-16,w:Math.random()*10+4,h:Math.random()*6+3,col:cols[Math.floor(Math.random()*cols.length)],vx:(Math.random()-.5)*5,vy:Math.random()*4+2,rot:Math.random()*Math.PI*2,vr:(Math.random()-.5)*.2,op:1}));let raf;const draw=()=>{ctx.clearRect(0,0,canvas.width,canvas.height);pts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.09;p.rot+=p.vr;p.op-=.007;if(p.op<=0)return;ctx.save();ctx.globalAlpha=Math.max(0,p.op);ctx.translate(p.x,p.y);ctx.rotate(p.rot);ctx.fillStyle=p.col;ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);ctx.restore();});if(pts.some(p=>p.op>0))raf=requestAnimationFrame(draw);};raf=requestAnimationFrame(draw);return()=>cancelAnimationFrame(raf);};

/* ── Count-up ───────────────────────────────────────────────────────────── */
const useCountUp=(end,ms=900)=>{const[v,setV]=useState(0);const r=useRef(null);useEffect(()=>{if(r.current)cancelAnimationFrame(r.current);if(!end){setV(0);return;}let t0=null;const s=ts=>{if(!t0)t0=ts;const p=Math.min((ts-t0)/ms,1),e=1-Math.pow(1-p,4);setV(end*e);if(p<1)r.current=requestAnimationFrame(s);};r.current=requestAnimationFrame(s);return()=>{if(r.current)cancelAnimationFrame(r.current);};},[end]);return v;};
const AV=({value})=>{const v=useCountUp(value);return<span>{R$(v)}</span>;};

/* ── Countdown Ring ─────────────────────────────────────────────────────── */
const Countdown=({dataInicio,dataVencimento})=>{
  const days=daysLeft(dataVencimento),total=daysDiff(dataInicio,dataVencimento);
  const passed=Math.max(0,total-Math.max(0,days)),pct=total>0?Math.min(100,(passed/total)*100):0;
  const late=days<0,tod=days===0,urg=days>0&&days<=5;
  const col=late?'#ff453a':tod||urg?'#ff9f0a':'#3b82f6';
  const lbl=late?`${Math.abs(days)}d em atraso`:tod?'Vence hoje':`${days}d restantes`;
  const r=18,c=2*Math.PI*r,dash=c-(pct/100)*c;
  return(
    <div style={{display:'flex',alignItems:'center',gap:12}}>
      <div style={{position:'relative',width:46,height:46,flexShrink:0}}>
        <svg width="46" height="46" viewBox="0 0 46 46" style={{transform:'rotate(-90deg)'}}>
          <circle cx="23" cy="23" r={r} fill="none" stroke="rgba(255,255,255,.05)" strokeWidth="2.5"/>
          <circle cx="23" cy="23" r={r} fill="none" stroke={col} strokeWidth="2.5"
            strokeDasharray={c} strokeDashoffset={late?0:dash} strokeLinecap="round"
            style={{transition:'stroke-dashoffset .7s ease'}}/>
        </svg>
        <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',fontSize:late||tod?'8px':'10px',fontWeight:900,color:col,lineHeight:1,textAlign:'center'}}>
          {late?`+${Math.abs(days)}`:tod?'!':days}
        </div>
      </div>
      <div>
        <div style={{display:'inline-flex',alignItems:'center',gap:5,background:`${col}14`,border:`1px solid ${col}28`,borderRadius:99,padding:'4px 11px',fontSize:11,fontWeight:700,color:col}} className={late?'pr':''}>
          {lbl}
        </div>
        <div style={{fontSize:10,color:'#6b7280',marginTop:4}}>
          {new Date(dataVencimento+'T00:00:00').toLocaleDateString('pt-BR')} · {passed}/{total} dias
        </div>
      </div>
    </div>
  );
};
const PBar=({dataInicio,dataVencimento})=>{
  const days=daysLeft(dataVencimento),total=daysDiff(dataInicio,dataVencimento);
  const passed=Math.max(0,total-Math.max(0,days)),pct=total>0?Math.min(100,(passed/total)*100):0;
  const late=days<0,col=late?'#ff453a':pct>80?'#ff9f0a':'#3b82f6';
  return<div style={{height:2,background:'rgba(255,255,255,.05)',borderRadius:99,overflow:'hidden',marginTop:8}}><div style={{height:'100%',width:`${late?100:pct}%`,background:col,borderRadius:99,transition:'width .7s ease'}}/></div>;
};

/* ── Meta Ring ──────────────────────────────────────────────────────────── */
const MetaRing=({current,meta,onClick})=>{
  const pctRaw=meta>0?Math.min(100,(current/meta)*100):0;
  const pct=Math.max(0,Number.isFinite(pctRaw)?pctRaw:0);
  const pctV=useCountUp(pct,900);
  const done=pct>=100;
  const col=done?'#10b981':pct>=70?'#f59e0b':pct>=40?'#60a5fa':'rgba(255,255,255,.55)';
  const r=38,circ=2*Math.PI*r,dash=circ-(pct/100)*circ;
  const gradRef=useRef('');
  if(!gradRef.current)gradRef.current=`g${Math.random().toString(36).slice(2)}`;
  return(
    <div onClick={onClick} className="glass" style={{border:`1px solid ${done?'rgba(16,185,129,.30)':pct>=70?'rgba(245,158,11,.26)':pct>=40?'rgba(96,165,250,.26)':'rgba(255,255,255,.14)'}`,borderRadius:18,padding:'15px 16px',cursor:'pointer',display:'flex',alignItems:'center',gap:15,position:'relative',overflow:'hidden'}}>
      <div style={{position:'absolute',inset:0,background:`linear-gradient(90deg, transparent, ${done?'rgba(16,185,129,.10)':pct>=70?'rgba(245,158,11,.10)':pct>=40?'rgba(96,165,250,.10)':'rgba(255,255,255,.07)'}, transparent)`,transform:'translateX(-140%)',animation:'metaSheen 2.8s ease-in-out infinite',pointerEvents:'none'}}/>
      <div style={{position:'relative',flexShrink:0}}>
        <svg width="84" height="84" viewBox="0 0 84 84" style={{transform:'rotate(-90deg)'}}>
          <defs>
            <linearGradient id={gradRef.current} x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stopColor={col} stopOpacity="1"/>
              <stop offset="70%" stopColor="#ffffff" stopOpacity=".55"/>
              <stop offset="100%" stopColor={col} stopOpacity="1"/>
            </linearGradient>
          </defs>
          <circle cx="42" cy="42" r={r} fill="none" stroke="rgba(255,255,255,.06)" strokeWidth="5"/>
          <circle cx="42" cy="42" r={r} fill="none" stroke={`url(#${gradRef.current})`} strokeWidth="5"
            strokeDasharray={circ} strokeDashoffset={meta===0?circ:dash}
            strokeLinecap="round" style={{transition:'stroke-dashoffset .9s cubic-bezier(.22,1,.36,1)',filter:`drop-shadow(0 0 10px ${String(col).includes('rgba')?'rgba(255,255,255,.25)':col}55)`}}/>
        </svg>
        <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',animation:done?'metaPulse 2s ease-in-out infinite':'none'}}>
          <div style={{fontSize:16,fontWeight:900,color:col,lineHeight:1}}>{Math.round(pctV)}%</div>
          <div style={{fontSize:7,color:'rgba(255,255,255,.68)',marginTop:2,fontWeight:900,letterSpacing:'.14em',textTransform:'uppercase'}}>Meta</div>
        </div>
      </div>
      <div style={{flex:1,minWidth:0}}>
        <div style={{fontSize:11,color:'rgba(255,255,255,.78)',fontWeight:900,letterSpacing:'.12em',textTransform:'uppercase',marginBottom:3}}>Meta Mensal</div>
        <div style={{fontSize:22,fontWeight:800,color:'#fff',letterSpacing:'-.04em',lineHeight:1,marginBottom:4}}><AV value={current}/></div>
        <div style={{fontSize:11,color:'rgba(255,255,255,.72)',marginBottom:8}}>de {meta>0?R$(meta):'—'} · falta {meta>0?R$(Math.max(0,meta-current)):'—'}</div>
        <span style={{display:'inline-flex',alignItems:'center',background:`${col}18`,borderRadius:99,padding:'3px 10px',fontSize:11,fontWeight:700,color:col,border:`1px solid ${col}28`}}>
          {done?'Meta Alcançada':pct>=70?'Quase lá':pct>=40?'No caminho':pct>0?'Arrancando':'Definir Meta'}
        </span>
      </div>
    </div>
  );
};

/* ── Recolhimentos Modal ─────────────────────────────────────────────────── */
const RecolhidoModal=({contracts,cfg,onClose,onToast})=>{
  const [recolhimentos,setRecolhimentos]=useState([]);
  const [loading,setLoading]=useState(true);
  const [resumo,setResumo]=useState({totalPendente:0,totalPago:0,quantidadeRecolhimentos:0});
  
  useEffect(()=>{
    const loadRecolhimentos=async()=>{
      setLoading(true);
      const recs=await api.get('/api/recolhimentos');
      const res=await api.get('/api/resumo-socio');
      setRecolhimentos(Array.isArray(recs)?recs:[]);
      setResumo(res||{totalPendente:0,totalPago:0,quantidadeRecolhimentos:0});
      setLoading(false);
    };
    loadRecolhimentos();
  },[]);
  
  const handlePagar=async(id)=>{
    const rec=recolhimentos.find(r=>r.id===id);
    if(!rec)return;
    
    const updatedRec={...rec,status:'PAGO',dataPagamento:today()};
    await api.put(`/api/recolhimentos/${id}`,updatedRec);
    
    // Atualizar lista
    setRecolhimentos(recs=>recs.map(r=>r.id===id?updatedRec:r));
    
    // Atualizar resumo
    setResumo(prev=>({
      ...prev,
      totalPendente:prev.totalPendente-rec.valor,
      totalPago:prev.totalPago+rec.valor
    }));
    
    onToast&&onToast(`Pagamento de R$ ${rec.valor.toFixed(2)} registrado!`);
  };
  
  return(
    <div style={{position:'fixed',inset:0,background:'rgba(6,9,20,.95)',backdropFilter:'blur(12px)',zIndex:50,display:'flex',alignItems:'flex-end',justifyContent:'center'}} onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="pop" style={{background:'rgba(255,255,255,.05)',border:'1px solid rgba(255,255,255,.08)',borderRadius:'22px 22px 0 0',width:'100%',maxWidth:480,maxHeight:'92vh',overflowY:'auto',paddingBottom:34}}>
        <div style={{width:30,height:3,background:'#374151',borderRadius:99,margin:'11px auto 0'}}/>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'16px 18px 14px'}}>
          <div>
            <div style={{fontWeight:800,fontSize:19,color:'#fff',letterSpacing:'-.03em'}}>Participação — {cfg?.socioNome||'Sócio'}</div>
            <div style={{fontSize:12,color:'#9ca3af'}}>Distribuição de resultados ao sócio</div>
          </div>
          <button onClick={onClose} style={{background:'rgba(255,255,255,.08)',border:'none',borderRadius:10,width:32,height:32,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',color:'#9ca3af'}}><Ic d={IC.x} size={14}/></button>
        </div>
        
        {/* Resumo */}
        <div style={{padding:'0 18px 16px'}}>
          <div style={{background:'rgba(255,255,255,.05)',border:'1px solid rgba(255,255,255,.09)',borderRadius:16,padding:16,marginBottom:16}}>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
              <div style={{textAlign:'center'}}>
                <div style={{fontSize:10,color:'#6b7280',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:2}}>A Distribuir</div>
                <div style={{fontSize:18,fontWeight:800,color:'#ff9f0a'}}>{R$(resumo.totalPendente)}</div>
              </div>
              <div style={{textAlign:'center'}}>
                <div style={{fontSize:10,color:'#6b7280',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:2}}>Já Distribuído</div>
                <div style={{fontSize:18,fontWeight:800,color:'#10b981'}}>{R$(resumo.totalPago)}</div>
              </div>
            </div>
          </div>
        </div>
        
        {/* Lista de recolhimentos */}
        <div style={{padding:'0 18px',maxHeight:'50vh',overflowY:'auto'}}>
          {loading?(
            <div style={{textAlign:'center',padding:'40px 0',color:'#6b7280'}}>Carregando carteira…</div>
          ):recolhimentos.length===0?(
            <div style={{textAlign:'center',padding:'40px 0',color:'#6b7280'}}>Nenhuma distribuição registrada</div>
          ):(
            <div style={{display:'flex',flexDirection:'column',gap:8}}>
              {recolhimentos.map(rec=>{
                const isPago=rec.status==='PAGO';
                return(
                  <div key={rec.id} style={{background:'rgba(255,255,255,.03)',border:'1px solid rgba(255,255,255,.06)',borderRadius:12,padding:12}}>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:6}}>
                      <div>
                        <div style={{fontSize:13,fontWeight:700,color:'#fff',marginBottom:2}}>{rec.descricao}</div>
                        <div style={{fontSize:11,color:'#6b7280'}}>{new Date(rec.data+'T00:00:00').toLocaleDateString('pt-BR')}</div>
                      </div>
                      <div style={{textAlign:'right'}}>
                        <div style={{fontSize:14,fontWeight:800,color:isPago?'#10b981':'#ff9f0a'}}>{R$(rec.valor)}</div>
                        <div style={{fontSize:10,color:isPago?'#6b7280':'#9ca3af',textTransform:'uppercase',letterSpacing:'.06em'}}>{rec.status}</div>
                      </div>
                    </div>
                    {!isPago&&(
                      <button onClick={()=>handlePagar(rec.id)} style={{width:'100%',background:'#10b981',border:'none',color:'#fff',borderRadius:8,padding:'8px',fontSize:12,fontWeight:700,cursor:'pointer',fontFamily:'inherit',marginTop:6}}>
                        Confirmar Distribuição
                      </button>
                    )}
                  </div>
                );
              })}
            </div>
          )}
        </div>
      </div>
    </div>
  );
};

/* ── Contract Modal ─────────────────────────────────────────────────────── */
const EMPTY={nome:'',cpf:'',telefone:'',chavePix:'',valorEmprestado:'',taxaServico:'30',dataInicio:'',dataVencimento:'',observacoes:'',maxPedaladas:'3'};
const ContractModal=({contract,cfg,onSave,onClose})=>{
  const td=today();
  const [form,setForm]=useState(()=>contract?{...contract,valorEmprestado:String(contract.valorEmprestado),taxaServico:String(contract.taxaServico),maxPedaladas:String(contract.maxPedaladas??3)}:{...EMPTY,dataInicio:td});
  const [errs,setErrs]=useState({});
  const [saving,setSaving]=useState(false);
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  const ret=useMemo(()=>(parseFloat(form.valorEmprestado)||0)*(1+(parseFloat(form.taxaServico)||0)/100),[form.valorEmprestado,form.taxaServico]);
  const lucro=ret-(parseFloat(form.valorEmprestado)||0);
  const pct=cfg?.temSocio?(cfg.socioPct||0):0;
  const socio=lucro*(pct/100);
  const liq=lucro-socio;
  const validate=()=>{
    const e={};
    if(!form.nome.trim())e.nome='Obrigatório';
    if(form.cpf.replace(/\D/g,'').length!==11)e.cpf='CPF incompleto';
    else if(!validateCPF(form.cpf))e.cpf='CPF inválido';
    if(!form.chavePix.trim())e.chavePix='Obrigatório';
    if(!form.valorEmprestado||parseFloat(form.valorEmprestado)<=0)e.valorEmprestado='Informe um valor';
    if(!form.dataInicio)e.dataInicio='Obrigatório';
    if(!form.dataVencimento)e.dataVencimento='Obrigatório';
    else if(form.dataVencimento<=form.dataInicio)e.dataVencimento='Deve ser após início';
    setErrs(e);return!Object.keys(e).length;
  };
  const submit=async e=>{
    e.preventDefault();if(!validate())return;setSaving(true);
    await onSave({
      ...(contract||{id:uid(),createdAt:new Date().toISOString(),pedaladas:0,pedaladaLog:[]}),
      ...form,
      valorEmprestado:parseFloat(form.valorEmprestado),
      taxaServico:parseFloat(form.taxaServico)||30,
      valorRetorno:ret,
      maxPedaladas:parseInt(form.maxPedaladas)||3,
    });
    setSaving(false);
  };
  return(
    <div style={{position:'fixed',inset:0,background:'rgba(6,9,20,.95)',backdropFilter:'blur(12px)',zIndex:50,display:'flex',alignItems:'flex-end',justifyContent:'center'}} onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="pop" style={{background:'rgba(255,255,255,.05)',border:'1px solid rgba(255,255,255,.08)',borderRadius:'22px 22px 0 0',width:'100%',maxWidth:480,maxHeight:'93vh',overflowY:'auto',paddingBottom:34}}>
        <div style={{width:30,height:3,background:'#374151',borderRadius:99,margin:'11px auto 0'}}/>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'16px 18px 0'}}>
          <div>
            <div style={{fontWeight:800,fontSize:19,color:'#fff',letterSpacing:'-.03em'}}>{contract?'Editar Instrumento':'Novo Instrumento'}</div>
            <div style={{fontSize:11,color:'#9ca3af',marginTop:3}}>Campos com * são obrigatórios</div>
          </div>
          <button onClick={onClose} style={{background:'rgba(255,255,255,.08)',border:'none',borderRadius:10,width:34,height:34,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',color:'#9ca3af'}}><Ic d={IC.x} size={14}/></button>
        </div>
        <form onSubmit={submit} style={{padding:'16px 18px 0'}}>
          <Fw label="Qualificação do Devedor" err={errs.nome} required>
            <input className="inp" style={iS(errs.nome)} value={form.nome} onChange={e=>set('nome',e.target.value)} placeholder="Nome completo"/>
          </Fw>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
            <Fw label="CPF" err={errs.cpf} required><input className="inp" style={iS(errs.cpf)} value={form.cpf} onChange={e=>set('cpf',fmtCPF(e.target.value))} placeholder="000.000.000-00" maxLength={14}/></Fw>
            <Fw label="Contato"><input className="inp" style={iS(false)} value={form.telefone} onChange={e=>set('telefone',fmtPhone(e.target.value))} placeholder="(00) 00000-0000" maxLength={15}/></Fw>
          </div>
          <Fw label="Chave Pix / IBAN" err={errs.chavePix} required>
            <input className="inp" style={iS(errs.chavePix)} value={form.chavePix} onChange={e=>set('chavePix',e.target.value)} placeholder="Chave de recebimento"/>
          </Fw>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
            <Fw label="Principal (R$)" err={errs.valorEmprestado} required><input type="number" min="0.01" step="0.01" className="inp" style={iS(errs.valorEmprestado)} value={form.valorEmprestado} onChange={e=>set('valorEmprestado',e.target.value)} placeholder="0,00"/></Fw>

            <textarea rows={2} className="inp" style={{...iS(false),resize:'none'}} value={form.observacoes} onChange={e=>set('observacoes',e.target.value)} placeholder="Garantias, lastros, observações jurídicas…"/>

const ContractCard=({c,cfg,onEdit,onDelete,onPay,index})=>{

  const initials=c.nome.trim().split(' ').filter(Boolean).slice(0,2).map(w=>w[0].toUpperCase()).join('');
  const ac=isPago?'#10b981':late?'#ff453a':tod||urg?'#ff9f0a':'#3b82f6';

  const jurosAtraso=!isPago?calcJurosAtraso(c,cfg):0;

          <button onClick={copyPix} style={{display:'flex',alignItems:'center',gap:4,background:'none',border:'none',cursor:'pointer',padding:0,marginTop:2}}>

  const fmtDate=d=>d?new Date(d+'T00:00:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'short'}):'—';
  const tipoLabel=t=>t==='PEDALADA'?'🚴 Pedalada':'✅ Pag. Total';

        <button onClick={()=>setExpanded(e=>!e)} style={{background:'rgba(124,58,237,.1)',border:'1px solid rgba(124,58,237,.2)',borderRadius:8,padding:'5px 10px',fontSize:10,fontWeight:700,color:'#a78bfa',cursor:'pointer',fontFamily:'inherit'}}>

          <div style={{fontSize:11,color:'#9ca3af'}}>A distribuir para {cfg.socioNome}: <strong style={{color:'#f59e0b'}}>{R$(summary.recolhimentosPendentes)}</strong></div>
          <div style={{fontSize:10,color:'#f59e0b',fontWeight:700}}>DISTRIBUIR ›</div>
        </div>
      )}
      {/* lista expandida */}
      {expanded&&(
        <div style={{padding:'0 14px 14px'}}>
          {pendentes.length>0&&(
            <>
              <div style={{fontSize:9,color:'#f59e0b',fontWeight:700,textTransform:'uppercase',letterSpacing:'.09em',margin:'12px 0 7px'}}>A Distribuir — {R$(summary.recolhimentosPendentes)}</div>
              {pendentes.map(rec=>(
                <div key={rec.id} style={{background:'rgba(245,158,11,.06)',border:'1px solid rgba(245,158,11,.15)',borderRadius:12,padding:'11px 12px',marginBottom:6}}>
                  <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:7}}>
                    <div>
                      <div style={{fontSize:12,fontWeight:700,color:'#fff'}}>{rec.contratoNome}</div>
                      <div style={{fontSize:10,color:'#6b7280',marginTop:1}}>{tipoLabel(rec.tipo)} · {fmtDate(rec.data)}</div>
                    </div>
                    <div style={{fontSize:15,fontWeight:900,color:'#f59e0b'}}>{R$(rec.valor)}</div>
                  </div>
                  <button onClick={()=>onPagar(rec.id)} style={{width:'100%',background:'#f59e0b',border:'none',color:'#000',borderRadius:8,padding:'8px',fontSize:12,fontWeight:800,cursor:'pointer',fontFamily:'inherit'}}>
                    Confirmar Distribuição
                  </button>
                </div>
              ))}
            </>
          )}
          {pagos.length>0&&(
            <>
              <div style={{fontSize:9,color:'#10b981',fontWeight:700,textTransform:'uppercase',letterSpacing:'.09em',margin:'14px 0 7px'}}>Distribuído — {R$(summary.recolhimentosPagos)}</div>
              {pagos.map(rec=>(
                <div key={rec.id} style={{background:'rgba(16,185,129,.04)',border:'1px solid rgba(16,185,129,.1)',borderRadius:12,padding:'10px 12px',marginBottom:5,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                  <div>
                    <div style={{fontSize:12,fontWeight:700,color:'#9ca3af'}}>{rec.contratoNome}</div>
                    <div style={{fontSize:10,color:'#4b5563',marginTop:1}}>{tipoLabel(rec.tipo)} · {fmtDate(rec.data)}</div>
                  </div>
                  <div style={{textAlign:'right'}}>
                    <div style={{fontSize:13,fontWeight:800,color:'#10b981'}}>{R$(rec.valor)}</div>
                    <div style={{fontSize:9,color:'#4b5563',marginTop:1}}>Pago em {fmtDate(rec.dataPagamento)}</div>
                  </div>
                </div>
              ))}
            </>
          )}
          {recolhimentos.length===0&&(
            <div style={{textAlign:'center',padding:'20px 0',color:'#4b5563',fontSize:12}}>Nenhuma distribuição registrada</div>
          )}
        </div>
      )}
    </section>
  );
};

/* ── App ────────────────────────────────────────────────────────────────── */
const App=()=>{
  const [user,setUser]=useState(null);
  const [contracts,setContracts]=useState([]);
  const [recolhimentos,setRecolhimentos]=useState([]);
  const [loading,setLoading]=useState(true);
  const [search,setSearch]=useState('');
  const [modal,setModal]=useState(null);
  const [delTgt,setDelTgt]=useState(null);
  const [bulkDelPaid,setBulkDelPaid]=useState(false);
  const [filter,setFilter]=useState('Prazo');
  const [toast,setToast]=useState(null);
  const [tab,setTab]=useState('carteira');
  const [inbox,setInbox]=useState([]);
  const [hideMoney,setHideMoney]=useState(false);
  const [finSel,setFinSel]=useState(null);
  const [finStatus,setFinStatus]=useState('all');
  const [finRating,setFinRating]=useState('all');
  const [meta,setMeta]=useState(()=>parseFloat(localStorage.getItem('bpx_meta')||'0'));
  const [metaModal,setMetaModal]=useState(false);
  const [celeb,setCeleb]=useState(null);
  const [payTgt,setPayTgt]=useState(null);
  const [settingsOpen,setSettingsOpen]=useState(false);
  const [cfg,setCfg]=useState(()=>loadCfg());
  const [recolhidoModal,setRecolhidoModal]=useState(false);

  const showToast=(msg,type='success')=>{setToast({msg,type});setTimeout(()=>setToast(null),3000);};

  const pushInbox=useCallback((title,body)=>{
    const id=uid();
    const when=new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
    setInbox(cur=>[{id,title,body,when},...cur].slice(0,3));
  },[]);

  const downloadComprovante=(ev)=>{
    const c=contracts.find(x=>x.id===ev.contratoId);
    const now=new Date();
    const fmtDt=d=>d?new Date(d+'T00:00:00').toLocaleDateString('pt-BR'):'—';
    const emitidoEm=now.toLocaleString('pt-BR');
    const protocolo=`${(ev.tipo||'EV').slice(0,3)}-${String(ev.contratoId||'').slice(0,8)}-${String(ev.data||'').replaceAll('-','')||'ND'}-${String(ev.id||'').slice(-6)}`.toUpperCase();

    const linhas=[];
    linhas.push(['Tipo de Operação', ev.tipo==='LIQUIDACAO'?'Liquidação Total':'Amortização Parcial (Juros)']);
    linhas.push(['Data do Registro', fmtDt(ev.data)]);
    linhas.push(['Beneficiário', ev.contratoNome||'—']);
    linhas.push(['Valor', R$(ev.valor)]);
    linhas.push(['ID do Contrato', ev.contratoId||'—']);
    linhas.push(['Protocolo', protocolo]);
    if(ev.tipo==='LIQUIDACAO'&&c){
      const enc=c.jurosAtrasoRecolhido||0;
      linhas.push(['Base (Resgate)', R$(c.valorRetorno)]);
      linhas.push(['Encargos (Atraso)', R$(enc)]);
      linhas.push(['Total Liquidado', R$((c.valorRetorno||0)+enc)]);
    }
    if(ev.tipo==='PEDALADA'&&c){
      const last=Array.isArray(c.pedaladaLog)?c.pedaladaLog.find(p=>p?.data===ev.data&&p?.valor===ev.valor):null;
      if(last?.novoVenc)linhas.push(['Novo Vencimento', fmtDt(last.novoVenc)]);
    }

    const html=`<!doctype html>
<html lang="pt-BR"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Comprovante</title>
<style>
  :root{--txt:#0b1220;--muted:#5b6475;--line:#e6e8ee;--bg:#f6f7fb;--card:#ffffff;--brand:#111827;}
  *{box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,Arial,sans-serif}
  body{margin:0;background:var(--bg);color:var(--txt)}
  .wrap{max-width:820px;margin:24px auto;padding:0 16px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:18px;overflow:hidden;box-shadow:0 10px 30px rgba(17,24,39,.06)}
  .top{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:18px 20px;border-bottom:1px solid var(--line)}
  .brand{display:flex;align-items:center;gap:12px}
  .logo{width:180px;height:44px;background:url("/assets/images/O%20BOBO%20JURISTA.png") 0 50%/contain no-repeat}
  .title{font-weight:800;letter-spacing:-.02em;color:var(--brand)}
  .meta{color:var(--muted);font-size:12px;line-height:1.4;text-align:right}
  .body{padding:18px 20px}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .row{border:1px solid var(--line);border-radius:14px;padding:12px 12px;background:#fff}
  .k{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}
  .v{font-size:14px;font-weight:700;color:var(--txt);word-break:break-word}

  .btns{margin-top:14px;display:flex;gap:10px;flex-wrap:wrap}
  .btn{border:1px solid var(--line);background:#fff;border-radius:12px;padding:10px 12px;font-weight:700;cursor:pointer}
  .btnp{border:1px solid #0ea5e9;background:#0ea5e9;color:#fff}
  @media print{body{background:#fff}.wrap{margin:0;max-width:none}.btns{display:none}.card{box-shadow:none}}
</style></head><body>
  <div class="wrap">
    <div class="card">
      <div class="top">
        <div class="brand"><div class="logo"></div><div class="title">Comprovante de Registro</div></div>
        <div class="meta"><div>Emitido em: ${emitidoEm}</div><div>Protocolo: ${protocolo}</div></div>
      </div>
      <div class="body">
        <div class="grid">
          ${linhas.map(([k,v])=>`<div class="row"><div class="k">${k}</div><div class="v">${String(v).replaceAll('<','&lt;')}</div></div>`).join('')}
        </div>
        <div class="obs"><div class="k">Observação</div><div class="v" style="font-weight:600">${String(ev.obs||'—').replaceAll('<','&lt;')}</div></div>
        <div class="btns">
          <button class="btn btnp" onclick="window.print()">Salvar / Imprimir</button>
          <button class="btn" onclick="window.close()">Fechar</button>
        </div>
      </div>
      <div class="foot">
        <div>Documento gerado automaticamente para conferência e arquivo.</div>
        <div>O Bobo Jurista · Registro interno</div>
      </div>
    </div>
  </div>
</body></html>`;

    const blob=new Blob([html],{type:'text/html;charset=utf-8'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;
    a.download=`comprovante-${protocolo}.html`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(()=>URL.revokeObjectURL(url),500);
    showToast('Comprovante gerado.','success');
  };
  const load=useCallback(async()=>{
    const [d,r]=await Promise.all([
      api.get('/api/contratos'),
      api.get('/api/recolhimentos')
    ]);
    const contratos=Array.isArray(d)?d:[];
    let recs=Array.isArray(r)?r:[];

    if(cfg?.temSocio){
      const pct=(cfg.socioPct||0)/100;
      const cents=n=>Math.round((n||0)*100);
      const keys=new Set(recs.map(x=>`${x.tipo}|${x.contratoId}|${x.data}|${cents(x.valor)}`));
      const extra=[];

      for(const c of contratos){
        if(c.pago){
          const fin=calcFin(c,cfg);
          const v=Number((fin.socio||0).toFixed(2));
          const data=c.pagoEm||c.dataVencimento||today();
          const k=`PAGAMENTO_TOTAL|${c.id}|${data}|${cents(v)}`;
          if(v>0&&!keys.has(k)){
            const obj={id:uid(),contratoId:c.id,contratoNome:c.nome,valor:v,tipo:'PAGAMENTO_TOTAL',data,status:'PENDENTE',descricao:`Liquidação total do contrato. Motivo: quitação integral do título. Por quê: distribuição de resultado conforme participação (${cfg.socioPct}%).`};
            extra.push(obj);
            keys.add(k);
          }
        }

        const logs=Array.isArray(c.pedaladaLog)?c.pedaladaLog:[];
        logs.forEach(p=>{
          const data=p?.data||today();
          const v=Number(((p?.valor||0)*pct).toFixed(2));
          const k=`PEDALADA|${c.id}|${data}|${cents(v)}`;
          if(v>0&&!keys.has(k)){
            const obj={id:uid(),contratoId:c.id,contratoNome:c.nome,valor:v,tipo:'PEDALADA',data,status:'PENDENTE',descricao:`Amortização parcial (juros) registrada. Motivo: prorrogação do vencimento. Por quê: remuneração recebida e principal mantido em aberto. Distribuição conforme participação (${cfg.socioPct}%).`};
            extra.push(obj);
            keys.add(k);
          }
        });
      }

      if(extra.length){
        for(const x of extra){
          await api.post('/api/recolhimentos',x);
        }
        recs=[...recs,...extra];
      }
    }

    setContracts(contratos);
    setRecolhimentos(recs);
  },[cfg]);

  useEffect(()=>{
    (async()=>{
      const me=await api.get('/api/me');
      if(!me.ok){window.location='/login';return;}
      setUser(me.nome);await load();setLoading(false);
    })();
  },[load]);

  const handleSave=async data=>{
    const exists=contracts.find(c=>c.id===data.id);
    if(exists)await api.put(`/api/contratos/${data.id}`,data);
    else await api.post('/api/contratos',data);
    await load();setModal(null);
    if(!exists){
      setCeleb(data);
      const principal=R$(data.valorEmprestado);
      const resgate=R$(data.valorRetorno);
      pushInbox('Novo contrato registrado',`${data.nome} · Principal ${principal} · Resgate ${resgate} · Operador ${user||'—'}`);
      playSaleSound(SALE_SOUND_URL);
    } else showToast('Contrato atualizado!');
  };
  const handleDelete=async()=>{await api.delete(`/api/contratos/${delTgt.id}`);await load();setDelTgt(null);showToast('Contrato excluído.','info');};

  const handleBulkDeletePaid=async()=>{
    const pagos=contracts.filter(c=>c.pago);
    for(const c of pagos){
      await api.delete(`/api/contratos/${c.id}`);
    }
    await load();
    setBulkDelPaid(false);
    showToast(`Liquidados excluídos: ${pagos.length}`,'info');
  };

  const handlePagoTotal=async(jurosAtrasoRecolhido=0)=>{
    const c=payTgt;
    const fin=calcFin(c,cfg);
    const u={...c,pago:true,pagoEm:today(),...(jurosAtrasoRecolhido>0?{jurosAtrasoRecolhido}:{})};
    await api.put(`/api/contratos/${c.id}`,u);
    if(cfg?.temSocio&&fin.socio>0){
      await api.post('/api/recolhimentos',{
        id:uid(),contratoId:c.id,contratoNome:c.nome,
        valor:fin.socio,tipo:'PAGAMENTO_TOTAL',data:today(),status:'PENDENTE',
        descricao:`Liquidação total do contrato. Motivo: quitação integral do título. Base: ${R$(c.valorRetorno)}${jurosAtrasoRecolhido>0?` + encargos ${R$(jurosAtrasoRecolhido)}`:''}.`
      });
    }
    await load();setPayTgt(null);
    const total=c.valorRetorno+(jurosAtrasoRecolhido||0);
    pushInbox('Liquidação registrada',`${c.nome} · Total ${R$(total)} · Operador ${user||'—'}`);
    playSaleSound(SALE_SOUND_URL);
    showToast(jurosAtrasoRecolhido>0?`Liquidação registrada! Total ${R$(total)}`:`Liquidação registrada! Total ${R$(total)}`);
  };

  const handlePedalada=async valorJuros=>{
    const c=payTgt;
    const novoInicio=today(),novoVenc=addDays(novoInicio,30);
    
    // Calcular a parte do sócio (30% do lucro)
    const pct=cfg?.temSocio?(cfg.socioPct||0):0;
    const valorRecolhimento=valorJuros*(pct/100);
    
    const idx=(c.pedaladas||0)+1;
    const obsPedalada=`Recebido ${R$(valorJuros)} em amortização parcial. Motivo: prorrogação do vencimento. Por quê: o principal permanece em aberto e o prazo é estendido para ${new Date(novoVenc+'T00:00:00').toLocaleDateString('pt-BR')}.`;
    const u={...c,dataInicio:novoInicio,dataVencimento:novoVenc,pedaladas:idx,pedaladaLog:[...(c.pedaladaLog||[]),{data:novoInicio,valor:valorJuros,novoVenc,obs:obsPedalada}]};
    await api.put(`/api/contratos/${c.id}`,u);
    
    // Criar recolhimento para o sócio
    if(valorRecolhimento>0){
      await api.post('/api/recolhimentos',{
        id:uid(),
        contratoId:c.id,
        contratoNome:c.nome,
        valor:valorRecolhimento,
        tipo:'PEDALADA',
        data:novoInicio,
        status:'PENDENTE',
        descricao:`Amortização parcial (juros) registrada. Motivo: prorrogação do vencimento. Por quê: o principal permanece em aberto e a remuneração do período foi recebida. ${obsPedalada}`
      });
    }
    
    await load();setPayTgt(null);
    showToast(`Amortização parcial registrada: ${R$(valorJuros)} · novo vencimento ${new Date(novoVenc+'T00:00:00').toLocaleDateString('pt-BR')}`);
  };

  const handleSetMeta=val=>{setMeta(val);localStorage.setItem('bpx_meta',String(val));setMetaModal(false);showToast('Meta definida!');};
  const handleCfgSave=newCfg=>{setCfg(newCfg);setSettingsOpen(false);showToast('Configurações salvas!');};
  const logout=async()=>{await api.post('/api/logout',{});window.location='/login';};

  const summary=useMemo(()=>{
    const ativos=contracts.filter(c=>!c.pago),pagos=contracts.filter(c=>c.pago);
    const emGiro=ativos.reduce((s,c)=>s+c.valorEmprestado,0);
    const aReceber=ativos.reduce((s,c)=>s+c.valorRetorno,0);
    const lucroAtivo=ativos.reduce((s,c)=>s+calcFin(c,cfg).lucro,0);
    const liqAtivo=ativos.reduce((s,c)=>s+calcFin(c,cfg).liquido,0);
    const pctSocio=cfg?.temSocio?(cfg.socioPct||0)/100:0;
    const pedaladaTotal=contracts.reduce((s,c)=>s+(c.pedaladaLog||[]).reduce((ps,p)=>ps+(p.valor||0),0),0);
    const socioPedalada=contracts.reduce((s,c)=>s+(c.pedaladaLog||[]).reduce((ps,p)=>ps+((p.valor||0)*pctSocio),0),0);
    const liqPedalada=pedaladaTotal-socioPedalada;
    const recolhido=pagos.reduce((s,c)=>s+c.valorRetorno,0)+pedaladaTotal;
    const jurosRecolhidos=pagos.reduce((s,c)=>s+calcFin(c,cfg).lucro,0)+pedaladaTotal;
    const socioRecolhido=pagos.reduce((s,c)=>s+calcFin(c,cfg).socio,0)+socioPedalada;
    const liqRecolhido=pagos.reduce((s,c)=>s+calcFin(c,cfg).liquido,0)+liqPedalada;
    const totalLiq=contracts.reduce((s,c)=>s+calcFin(c,cfg).liquido,0);
    const totalSocio=contracts.reduce((s,c)=>s+calcFin(c,cfg).socio,0);
    
    // Calcular recolhimentos adicionais
    const recolhimentosPendentes=recolhimentos.filter(r=>r.status==='PENDENTE').reduce((s,r)=>s+r.valor,0);
    const recolhimentosPagos=recolhimentos.filter(r=>r.status==='PAGO').reduce((s,r)=>s+r.valor,0);
    const totalRecolhimentos=recolhimentos.reduce((s,r)=>s+r.valor,0);
    
    const late=ativos.filter(c=>daysLeft(c.dataVencimento)<0).length;
    const totalPedaladas=contracts.reduce((s,c)=>s+(c.pedaladas||0),0);
    return{emGiro,aReceber,lucroAtivo,liqAtivo,recolhido,jurosRecolhidos,socioRecolhido,liqRecolhido,totalLiq,totalSocio,recolhimentosPendentes,recolhimentosPagos,totalRecolhimentos,late,count:contracts.length,ativoCount:ativos.length,pagoCount:pagos.length,liqPago:liqRecolhido,totalPedaladas};
  },[contracts,cfg,recolhimentos]);

  const liquidados=useMemo(()=>{
    const ev=[];
    const fmtDate=d=>d?new Date(d+'T00:00:00').toLocaleDateString('pt-BR'):'';
    for(const c of contracts){
      if(c.pago){
        const enc=c.jurosAtrasoRecolhido||0;
        const total=(c.valorRetorno||0)+enc;
        const data=c.pagoEm||c.dataVencimento||today();
        const obs=enc>0
          ?`Recebimento integral registrado. Motivo: liquidação do contrato. Por quê: encerra a exigibilidade do título. Base: ${R$(c.valorRetorno)} + encargos ${R$(enc)} = ${R$(total)}.`
          :`Recebimento integral registrado. Motivo: liquidação do contrato. Por quê: encerra a exigibilidade do título. Valor: ${R$(c.valorRetorno)}.`;
        ev.push({id:`liq-${c.id}`,tipo:'LIQUIDACAO',contratoId:c.id,contratoNome:c.nome,data,valor:total,obs,label:`Liquidação Total${data?` · ${fmtDate(data)}`:''}`});
      }
      const logs=Array.isArray(c.pedaladaLog)?c.pedaladaLog:[];
      logs.forEach((p,i)=>{
        const data=p?.data||'';
        const valor=p?.valor||0;
        const novoVenc=p?.novoVenc||'';
        const obs=p?.obs||`Recebido ${R$(valor)} em amortização parcial. Motivo: prorrogação do vencimento. Por quê: o principal permanece em aberto${novoVenc?` e o prazo foi estendido para ${fmtDate(novoVenc)}`:''}.`;
        ev.push({id:`ped-${c.id}-${i}`,tipo:'PEDALADA',contratoId:c.id,contratoNome:c.nome,data,valor,obs,label:`Amortização Parcial${data?` · ${fmtDate(data)}`:''}`});
      });
    }
    ev.sort((a,b)=>{
      const da=a.data?new Date(a.data+'T00:00:00').getTime():0;
      const db=b.data?new Date(b.data+'T00:00:00').getTime():0;
      return db-da;
    });
    return ev;
  },[contracts]);

  const liquidadosFiltrados=useMemo(()=>liquidados,[liquidados]);

  const finOps=useMemo(()=>{
    const ratingIdx=buildRatingIndex(contracts);
    const ratingOf=c=>c?.rating||'—';
    const riskOf=c=>c?.perfilRisco||'—';
    const statusOf=c=>{
      if(c?.ajuizado)return 'Ajuizado';
      if(c?.pago)return 'Liquidado';
      const d=daysLeft(c?.dataVencimento);
      if(d<0)return 'Em mora';
      return 'Em compensação';
    };
    const moraDias=c=>Math.max(0,-daysLeft(c?.dataVencimento));
    const bucket=d=>d===0?'0':d<=30?'1-30':d<=60?'31-60':d<=90?'61-90':'90+';
    return contracts.map(c=>{
      const md=moraDias(c);
      const auto=ratingIdx.get(normCPF(c.cpf))||null;

      let opRating='—',opRisco='—';
      if(c?.ajuizado){opRating='D';opRisco='Alto';}
      else if(c?.pago){opRating='—';opRisco='—';}
      else if(md>=15){opRating='D';opRisco='Alto';}
      else if(md>=4){opRating='C';opRisco='Médio';}
      else if(md>=1){opRating='B';opRisco='Médio';}

      const baseRisco=(auto?.risco)||riskOf(c);
      const effRating=opRating!=='—'?opRating:baseRating;
      const effRisco=opRisco!=='—'?opRisco:baseRisco;
      return{
        id:c.id,
        nome:c.nome,
        cpf:c.cpf,
        principal:c.valorEmprestado||0,
        resgate:c.valorRetorno||0,
        remuneracao:(c.valorRetorno||0)-(c.valorEmprestado||0),
        dataInicio:c.dataInicio,
        dataExigibilidade:c.dataVencimento,
        status:statusOf(c),
        mora:md,
        bucket:bucket(md),
        rating:effRating,
        risco:effRisco,
        raw:c,

      months.push(d.toISOString().slice(0,7));
    }
    const monthEndTs=ym=>{
      const [y,m]=ym.split('-').map(Number);
      return new Date(y,m,0,23,59,59,999).getTime();
    };
    const growth=months.map(ym=>{
      const end=monthEndTs(ym);
      return contracts.reduce((s,c)=>{
        const di=c.dataInicio?new Date(c.dataInicio+'T00:00:00').getTime():0;
        return di&&di<=end?s+(c.valorEmprestado||0):s;
      },0);
    });
    const recovery=months.map(ym=>liquidados.reduce((s,e)=>e?.data?.slice(0,7)===ym?s+(e.valor||0):s,0));
    return{months,growth,recovery};

            return(
              <>
                <div style={{display:'flex',alignItems:'baseline',justifyContent:'space-between',marginBottom:10}}>
                  <div style={{fontSize:10,color:'#6b7280',fontWeight:700,letterSpacing:'.09em',textTransform:'uppercase'}}>Amortizações Parciais</div>
                  <div style={{fontSize:12,color:'#ff9f0a',fontWeight:900}}>{R$(totalPed)}</div>
                </div>
                {lista.length===0?(
                  <div className="fi" style={{textAlign:'center',padding:'54px 20px'}}>
                    <div style={{width:50,height:50,background:'rgba(255,255,255,.05)',borderRadius:15,display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 13px'}}><span style={{fontSize:20}}>🚴</span></div>
                    <div style={{color:'#6b7280',fontSize:14,fontWeight:700,marginBottom:4}}>Nenhuma amortização registrada</div>
                    <div style={{color:'#374151',fontSize:12}}>Registre uma amortização parcial no fluxo de pagamento</div>
                  </div>
                ):(
                  <>
                    <div style={{fontSize:11,color:'#9ca3af',marginBottom:10}}>{lista.length} cliente{lista.length!==1?'s':''} · {summary.totalPedaladas} registro{summary.totalPedaladas!==1?'s':''}</div>
                    {lista.map((c,i)=>{
                      const logs=Array.isArray(c.pedaladaLog)?c.pedaladaLog:[];
                      const total=logs.reduce((s,p)=>s+(p?.valor||0),0);
                      if(!logs.length)return null;
                      return(
                        <div key={c.id} className="fu" style={{animationDelay:`${i*.03}s`,background:'rgba(255,159,10,.05)',border:'1px solid rgba(255,159,10,.16)',borderRadius:14,marginBottom:8,overflow:'hidden'}}>
                          <div style={{padding:'12px 13px',display:'flex',alignItems:'center',justifyContent:'space-between',gap:10}}>
                            <div style={{minWidth:0}}>
                              <div style={{fontSize:13,fontWeight:900,color:'#fff',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{c.nome}</div>
                              <div style={{fontSize:10,color:'#6b7280',marginTop:2}}>{logs.length} registro{logs.length!==1?'s':''} · Total {R$(total)}</div>
                            </div>
                            <div style={{fontSize:11,fontWeight:900,color:'#ff9f0a',whiteSpace:'nowrap'}}>🚴</div>
                          </div>
                          <div style={{borderTop:'1px solid rgba(255,255,255,.05)',padding:'10px 12px'}}>
                            {logs.slice().reverse().map((p,pi)=>{
                              const ev={id:`ped-${c.id}-${pi}`,tipo:'PEDALADA',contratoId:c.id,contratoNome:c.nome,data:p?.data||'',valor:p?.valor||0,obs:p?.obs||''};
                              return(
                                <div key={`${c.id}-${pi}`} style={{background:'rgba(0,0,0,.18)',border:'1px solid rgba(255,255,255,.06)',borderRadius:12,padding:'10px 10px',marginBottom:7}}>
                                  <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:10}}>
                                    <div style={{minWidth:0}}>
                                      <div style={{fontSize:11,fontWeight:900,color:'#ff9f0a'}}>Amortização Parcial · {p?.data?new Date(p.data+'T00:00:00').toLocaleDateString('pt-BR'):''}</div>
                                      <div style={{fontSize:10,color:'#6b7280',marginTop:3,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{ev.obs||`Recebimento de ${R$(ev.valor)} em amortização parcial.`}</div>
                                    </div>
                                    <div style={{textAlign:'right'}}>
                                      <div style={{fontSize:13,fontWeight:900,color:'#fff'}}>{R$(ev.valor)}</div>
                                      <button onClick={()=>downloadComprovante(ev)} style={{marginTop:6,background:'#0ea5e9',border:'none',color:'#001018',borderRadius:10,padding:'7px 10px',fontSize:11,fontWeight:900,cursor:'pointer',fontFamily:'inherit'}}>Baixar</button>
                                    </div>
                                  </div>
                                </div>
                              );
                            })}
                          </div>
                        </div>
                      );
                    })}
                  </>
                )}
              </>
            );
          })()}
        </div>
      )}

      {/* FINANCEIRO */}
      {tab==='financeiro'&&(
        <div style={{padding:'10px 10px 120px'}}>

          {(()=>{
            const totalPrincipal=finOps.reduce((s,o)=>s+o.principal,0);
            const aum=finOps.filter(o=>o.status!=='Liquidado').reduce((s,o)=>s+o.principal,0);
            const nplExp=finOps.filter(o=>o.status==='Em mora').reduce((s,o)=>s+o.principal,0);
            const npl=aum?((nplExp/aum)*100):0;
            const yieldPct=totalPrincipal?((finOps.reduce((s,o)=>s+o.remuneracao,0)/totalPrincipal)*100):0;
            const ticket=finOps.length?(totalPrincipal/finOps.length):0;

            const maxV=Math.max(1,...finSeries.growth,...finSeries.recovery);
            const w=320,h=120,pad=10;
            const x=i=>pad+(i*(w-pad*2))/11;
            const y=v=>h-pad-((v/maxV)*(h-pad*2));
            const path=arr=>arr.map((v,i)=>`${i===0?'M':'L'}${x(i)},${y(v)}`).join(' ');

            const ratingKeys=['A','B','C','D','—'];
            const ratingSum=k=>finOps.filter(o=>o.status!=='Liquidado'&&(o.rating||'—')===k).reduce((s,o)=>s+o.principal,0);
            const ratingTotal=ratingKeys.reduce((s,k)=>s+ratingSum(k),0)||1;
            const ratingColor={A:'#10b981',B:'#f59e0b',C:'#fb923c',D:'#ef4444','—':'rgba(255,255,255,.25)'};

            return(
              <>
                <div className="glass" style={{borderRadius:18,padding:14,marginBottom:10}}>
                  <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:10,marginBottom:12}}>
                    <div>
                      <div style={{fontSize:10,color:'#9ca3af',fontWeight:800,letterSpacing:'.12em',textTransform:'uppercase'}}>Financeiro · CRM</div>
                      <div style={{fontSize:12,color:'rgba(255,255,255,.88)',fontWeight:800,marginTop:4}}>Visão consolidada de risco, liquidez e adimplemento</div>
                    </div>
                    <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap',justifyContent:'flex-end'}}>
                      <select className="inp" value={finStatus} onChange={e=>setFinStatus(e.target.value)} style={{maxWidth:170,padding:'10px 12px',fontSize:13}}>
                        <option value="all">Status: Geral</option>
                        <option value="Em compensação">Em compensação</option>
                        <option value="Em mora">Em mora</option>
                        <option value="Liquidado">Liquidado</option>
                        <option value="Ajuizado">Ajuizado</option>
                      </select>
                      <select className="inp" value={finRating} onChange={e=>setFinRating(e.target.value)} style={{maxWidth:140,padding:'10px 12px',fontSize:13}}>
                        <option value="all">Rating: Geral</option>
                        <option value="A">A</option>
                        <option value="B">B</option>
                        <option value="C">C</option>
                        <option value="D">D</option>
                        <option value="—">—</option>
                      </select>
                    </div>
                  </div>

                  <div className="crm-kpis" style={{display:'grid',gridTemplateColumns:'repeat(3, minmax(0, 1fr))',gap:8}}>
                    {[{t:'Total sob Gestão (AUM)',v:aum,s:'#60a5fa'},{t:'Rentabilidade Média (%)',v:yieldPct,c:'pct',s:'#10b981'},{t:'Inadimplência Real (%)',v:npl,c:'pct',s:npl>8?'#ef4444':npl>3?'#f59e0b':'#10b981'}].map((k,i)=>(
                      <div key={i} style={{background:'rgba(0,0,0,.28)',border:'1px solid rgba(255,255,255,.10)',borderRadius:16,padding:'12px 12px'}}>
                        <div style={{fontSize:9,color:'#9ca3af',fontWeight:800,letterSpacing:'.10em',textTransform:'uppercase',marginBottom:6}}>{k.t}</div>
                        <div style={{fontSize:18,fontWeight:900,color:'#fff',letterSpacing:'-.02em'}}>{k.c==='pct'?`${k.v.toFixed(2)}%`:R$(k.v)}</div>
                        <div style={{marginTop:6,height:2,borderRadius:99,background:`linear-gradient(90deg, ${k.s}, transparent)`}}/>
                      </div>
                    ))}
                  </div>

                  <div className="crm-charts" style={{display:'grid',gridTemplateColumns:'1.4fr .6fr',gap:10,marginTop:12}}>
                    <div style={{background:'rgba(0,0,0,.22)',border:'1px solid rgba(255,255,255,.10)',borderRadius:16,padding:12}}>
                      <div style={{display:'flex',alignItems:'baseline',justifyContent:'space-between',marginBottom:8}}>
                        <div style={{fontSize:9,color:'#9ca3af',fontWeight:800,letterSpacing:'.10em',textTransform:'uppercase'}}>Crescimento vs Recuperação (12m)</div>
                        <div style={{fontSize:10,color:'#6b7280'}}>{finSeries.months.at(-1)}</div>
                      </div>
                      <svg viewBox={`0 0 ${w} ${h}`} width="100%" height="130" preserveAspectRatio="none" style={{display:'block'}}>
                        <path d={path(finSeries.growth)} fill="none" stroke="#22d3ee" strokeWidth="2" opacity=".9"/>
                        <path d={path(finSeries.recovery)} fill="none" stroke="#f59e0b" strokeWidth="2" opacity=".9"/>
                      </svg>
                      <div style={{display:'flex',gap:12,marginTop:4,fontSize:10,color:'#9ca3af',fontWeight:700}}>
                        <div style={{display:'flex',alignItems:'center',gap:6}}><span style={{width:8,height:2,background:'#22d3ee',display:'inline-block'}}/>Crescimento</div>
                        <div style={{display:'flex',alignItems:'center',gap:6}}><span style={{width:8,height:2,background:'#f59e0b',display:'inline-block'}}/>Recuperação</div>
                        <div style={{marginLeft:'auto'}}>Ticket Médio: <span style={{color:'#fff'}}>{R$(ticket)}</span></div>
                      </div>
                    </div>

                    <div style={{background:'rgba(0,0,0,.22)',border:'1px solid rgba(255,255,255,.10)',borderRadius:16,padding:12}}>
                      <div style={{fontSize:9,color:'#9ca3af',fontWeight:800,letterSpacing:'.10em',textTransform:'uppercase',marginBottom:10}}>Carteira por Rating</div>
                      <div style={{height:10,borderRadius:99,overflow:'hidden',display:'flex',background:'rgba(255,255,255,.06)'}}>
                        {ratingKeys.map(k=>{
                          const v=ratingSum(k);
                          const w=(v/ratingTotal)*100;
                          return <div key={k} style={{width:`${w}%`,background:ratingColor[k]}}/>;
                        })}
                      </div>
                      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginTop:10}}>
                        {ratingKeys.map(k=>{
                          const v=ratingSum(k);
                          return(
                            <div key={k} style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:8}}>
                              <div style={{display:'flex',alignItems:'center',gap:6}}>
                                <div style={{width:8,height:8,borderRadius:'50%',background:ratingColor[k]}}/>
                                <div style={{fontSize:11,color:'#fff',fontWeight:800}}>Rating {k}</div>
                              </div>
                              <div style={{fontSize:11,color:'#9ca3af',fontWeight:800}}>{R$(v)}</div>
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  </div>
                </div>

                <div style={{display:'flex',alignItems:'baseline',justifyContent:'space-between',margin:'2px 2px 10px'}}>
                  <div style={{fontSize:10,color:'#9ca3af',fontWeight:800,letterSpacing:'.12em',textTransform:'uppercase'}}>Planilha Inteligente</div>
                  <div style={{fontSize:11,color:'rgba(255,255,255,.85)',fontWeight:800}}>{finOpsFiltradas.length} título{finOpsFiltradas.length!==1?'s':''}</div>
                </div>

                {finOpsFiltradas.map((o,i)=>{
                  const col=o.status==='Liquidado'?'#10b981':o.status==='Em mora'?'#ef4444':o.status==='Ajuizado'?'#f59e0b':'rgba(255,255,255,.65)';
                  const ratingTxt=o.status!=='Liquidado'?(o.mora>=15?'D':o.mora>=4?'C':o.mora>=1?'B':o.rating):o.rating;
                  const riscoTxt=o.status!=='Liquidado'?(o.mora>=15?'Alto':o.mora>=1?'Médio':o.risco):o.risco;
                  return(
                    <div key={o.id} className="glass" style={{borderRadius:16,padding:'12px 12px',marginBottom:8}}>
                      <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:10}}>
                        <div style={{minWidth:0}}>
                          <div style={{fontSize:12,fontWeight:900,color:'#fff',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{o.nome}</div>
                          <div style={{fontSize:10,color:'#9ca3af',marginTop:3}}>ID do Título: <span style={{color:'#fff',fontWeight:800}}>{o.id}</span> · Exigibilidade: <span style={{color:'#fff',fontWeight:800}}>{new Date(o.dataExigibilidade+'T00:00:00').toLocaleDateString('pt-BR')}</span></div>
                        </div>
                        <button onClick={()=>setFinSel(o.raw)} style={{background:'#0ea5e9',border:'none',color:'#001018',borderRadius:12,padding:'9px 10px',fontSize:12,fontWeight:900,cursor:'pointer',fontFamily:'inherit',flexShrink:0}}>Abrir</button>
                      </div>
                      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginTop:10}}>
                        {[{k:'Valor Nominal',v:R$(o.principal),c:'#fff'},{k:'Remuneração',v:R$(o.remuneracao),c:'#60a5fa'},{k:'Status de Adimplemento',v:o.status,c:col}].map((x,xi)=>(
                          <div key={xi} style={{background:'rgba(0,0,0,.18)',border:'1px solid rgba(255,255,255,.08)',borderRadius:14,padding:'10px 10px'}}>
                            <div style={{fontSize:9,color:'#9ca3af',fontWeight:800,letterSpacing:'.10em',textTransform:'uppercase',marginBottom:4}}>{x.k}</div>
                            <div style={{fontSize:12,fontWeight:900,color:x.c}}>{x.v}</div>
                          </div>
                        ))}
                      </div>
                      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:10,marginTop:10}}>
                        <div style={{fontSize:11,color:'#9ca3af'}}>Rating: <span style={{color:'#fff',fontWeight:900}}>{ratingTxt||'—'}</span> · Perfil de Risco: <span style={{color:'#fff',fontWeight:900}}>{riscoTxt||'—'}</span></div>
                        <div style={{fontSize:11,color:o.mora? '#ef4444':'#10b981',fontWeight:900}}>{o.mora?`${o.mora}d em mora`:'Adimplente'}</div>
                      </div>
                    </div>
                  );
                })}

                {cfg?.temSocio&&(
                  <div style={{marginTop:6}}>
                    <SocioCard cfg={cfg} summary={summary} recolhimentos={recolhimentos} onPagar={async id=>{
                      const rec=recolhimentos.find(r=>r.id===id);if(!rec)return;
                      await api.put(`/api/recolhimentos/${id}`,{...rec,status:'PAGO',dataPagamento:today()});
                      await load();showToast(`Pago ${R$(rec.valor)} para ${cfg.socioNome}`);
                    }}/>
                  </div>
                )}
              </>
            );
          })()}
        </div>
      )}

      {/* FAB */}
      <button onClick={()=>setModal('add')} className="glow" style={{position:'fixed',bottom:24,right:17,width:56,height:56,borderRadius:'50%',background:'#3b82f6',border:'none',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:'0 6px 28px rgba(10,132,255,.6)',color:'#fff',zIndex:40}}>
        <Ic d={IC.plus} size={22} sw={2.5}/>
      </button>

      {(modal==='add'||modal?.contract)&&<ContractModal contract={modal?.contract||null} cfg={cfg} onSave={handleSave} onClose={()=>setModal(null)}/>}
      {delTgt&&<DelModal name={delTgt.nome} onConfirm={handleDelete} onClose={()=>setDelTgt(null)}/>}
      {metaModal&&<MetaModal current={meta} onSave={handleSetMeta} onClose={()=>setMetaModal(false)}/>}
      {payTgt&&<PaymentModal contract={payTgt} cfg={cfg} onPagoTotal={handlePagoTotal} onPedalada={handlePedalada} onClose={()=>setPayTgt(null)}/>}
      {settingsOpen&&<SettingsModal onSave={handleCfgSave} onClose={()=>setSettingsOpen(false)}/>}
      {celeb&&<CelebrationModal contract={celeb} cfg={cfg} onClose={()=>{setCeleb(null);showToast('Contrato cadastrado!');}}/>}
      {recolhidoModal&&<RecolhidoModal contracts={contracts} cfg={cfg} onClose={()=>setRecolhidoModal(false)} onToast={showToast}/>}
      {finSel&&(
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.72)',backdropFilter:'blur(10px)',WebkitBackdropFilter:'blur(10px)',zIndex:70,display:'flex',alignItems:'flex-end',justifyContent:'center'}} onClick={e=>e.target===e.currentTarget&&setFinSel(null)}>
          <div className="pop" style={{width:'100%',maxWidth:720,maxHeight:'92vh',overflowY:'auto',background:'rgba(10,10,10,.85)',border:'1px solid rgba(255,255,255,.12)',borderRadius:'22px 22px 0 0',paddingBottom:22}}>
            <div style={{width:30,height:3,background:'rgba(255,255,255,.18)',borderRadius:99,margin:'11px auto 0'}}/>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'14px 16px 10px'}}>
              <div style={{minWidth:0}}>
                <div style={{fontSize:12,color:'#9ca3af',fontWeight:900,letterSpacing:'.12em',textTransform:'uppercase'}}>Ficha de Qualificação · KYC</div>
                <div style={{fontSize:16,fontWeight:900,color:'#fff',marginTop:4,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{finSel.nome}</div>
              </div>
              <button onClick={()=>setFinSel(null)} style={{background:'rgba(255,255,255,.06)',border:'1px solid rgba(255,255,255,.10)',borderRadius:12,width:36,height:36,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',color:'#9ca3af'}}><Ic d={IC.x} size={16}/></button>
            </div>

            <div style={{padding:'0 16px'}}>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:10}}>
                <div style={{background:'rgba(0,0,0,.26)',border:'1px solid rgba(255,255,255,.10)',borderRadius:16,padding:12}}>
                  <div style={{fontSize:9,color:'#9ca3af',fontWeight:900,letterSpacing:'.10em',textTransform:'uppercase',marginBottom:6}}>Rating</div>
                  <select className="inp" value={finSel.rating||'—'} onChange={e=>setFinSel(s=>({...s,rating:e.target.value}))} style={{padding:'10px 12px',fontSize:14}}>
                    <option value="—">—</option>
                    <option value="A">A</option>
                    <option value="B">B</option>
                    <option value="C">C</option>
                    <option value="D">D</option>
                  </select>
                </div>
                <div style={{background:'rgba(0,0,0,.26)',border:'1px solid rgba(255,255,255,.10)',borderRadius:16,padding:12}}>
                  <div style={{fontSize:9,color:'#9ca3af',fontWeight:900,letterSpacing:'.10em',textTransform:'uppercase',marginBottom:6}}>Perfil de Risco</div>
                  <select className="inp" value={finSel.perfilRisco||'—'} onChange={e=>setFinSel(s=>({...s,perfilRisco:e.target.value}))} style={{padding:'10px 12px',fontSize:14}}>
                    <option value="—">—</option>
                    <option value="Baixo">Baixo</option>
                    <option value="Médio">Médio</option>
                    <option value="Alto">Alto</option>
                  </select>
                </div>
              </div>

              <div style={{background:'rgba(0,0,0,.22)',border:'1px solid rgba(255,255,255,.10)',borderRadius:16,padding:12,marginBottom:10}}>
                <div style={{fontSize:9,color:'#9ca3af',fontWeight:900,letterSpacing:'.10em',textTransform:'uppercase',marginBottom:6}}>Lastro Patrimonial</div>
                <textarea className="inp" value={finSel.lastroPatrimonial||''} onChange={e=>setFinSel(s=>({...s,lastroPatrimonial:e.target.value}))} rows={3} style={{resize:'vertical'}}/>
              </div>

              <div style={{background:'rgba(0,0,0,.22)',border:'1px solid rgba(255,255,255,.10)',borderRadius:16,padding:12,marginBottom:10}}>
                <div style={{fontSize:9,color:'#9ca3af',fontWeight:900,letterSpacing:'.10em',textTransform:'uppercase',marginBottom:6}}>Vínculos Profissionais</div>
                <textarea className="inp" value={finSel.vinculosProfissionais||''} onChange={e=>setFinSel(s=>({...s,vinculosProfissionais:e.target.value}))} rows={3} style={{resize:'vertical'}}/>
              </div>

              <div style={{background:'rgba(0,0,0,.22)',border:'1px solid rgba(255,255,255,.10)',borderRadius:16,padding:12,marginBottom:12}}>
                <div style={{fontSize:9,color:'#9ca3af',fontWeight:900,letterSpacing:'.10em',textTransform:'uppercase',marginBottom:6}}>Histórico de Adimplemento</div>
                <textarea className="inp" value={finSel.historicoAdimplemento||''} onChange={e=>setFinSel(s=>({...s,historicoAdimplemento:e.target.value}))} rows={3} style={{resize:'vertical'}}/>
              </div>

              <button onClick={async()=>{await api.put(`/api/contratos/${finSel.id}`,finSel);await load();setFinSel(null);showToast('Registro atualizado.');}} style={{width:'100%',background:'#0ea5e9',border:'none',color:'#001018',borderRadius:14,padding:'14px',fontSize:14,fontWeight:900,cursor:'pointer',fontFamily:'inherit'}}>Consolidar Dados</button>
              <div style={{height:10}}/>
            </div>
          </div>
        </div>
      )}
      {toast&&<Toast msg={toast.msg} type={toast.type}/>}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
