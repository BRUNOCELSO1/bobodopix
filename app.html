<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
  <title>Bobo do Pix</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;font-family:'Inter',sans-serif;-webkit-tap-highlight-color:transparent}
    html,body{background:#000;color:#fff;margin:0;min-height:100%}
    .bg-canvas{position:fixed;inset:0;overflow:hidden;pointer-events:none;z-index:0}
    .orb{position:absolute;border-radius:50%;filter:blur(120px);opacity:.06}
    .o1{width:500px;height:500px;background:#0a84ff;top:-150px;left:-100px;animation:o1 18s ease-in-out infinite}
    .o2{width:400px;height:400px;background:#5e5ce6;bottom:-100px;right:-100px;animation:o2 22s ease-in-out infinite}
    .o3{width:300px;height:300px;background:#30d158;top:45%;left:38%;animation:o3 14s ease-in-out infinite}
    @keyframes o1{0%,100%{transform:translate(0,0)}40%{transform:translate(60px,-40px)}70%{transform:translate(-30px,50px)}}
    @keyframes o2{0%,100%{transform:translate(0,0)}40%{transform:translate(-50px,30px)}70%{transform:translate(40px,-60px)}}
    @keyframes o3{0%,100%{transform:translate(-50%,-50%) scale(1)}50%{transform:translate(-50%,-50%) scale(1.3)}}
    ::-webkit-scrollbar{width:2px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:#3a3a3c;border-radius:99px}
    @keyframes up{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    @keyframes popIn{from{opacity:0;transform:scale(.94) translateY(16px)}to{opacity:1;transform:scale(1) translateY(0)}}
    @keyframes celebIn{from{opacity:0;transform:scale(.88)}to{opacity:1;transform:scale(1)}}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
    @keyframes glow{0%,100%{box-shadow:0 0 20px rgba(10,132,255,.3)}50%{box-shadow:0 0 44px rgba(10,132,255,.6)}}
    @keyframes pr{0%{box-shadow:0 0 0 0 rgba(255,69,58,.4)}70%{box-shadow:0 0 0 10px rgba(255,69,58,0)}100%{box-shadow:0 0 0 0 rgba(255,69,58,0)}}
    @keyframes toastIn{from{opacity:0;transform:translateY(18px) scale(.94)}to{opacity:1;transform:translateY(0) scale(1)}}
    @keyframes npop{0%{transform:scale(.7);opacity:0}70%{transform:scale(1.06)}100%{transform:scale(1);opacity:1}}
    .fu{animation:up .3s ease-out both}
    .fi{animation:fadeIn .22s ease-out both}
    .pop{animation:popIn .25s cubic-bezier(.34,1.56,.64,1) both}
    .celeb{animation:celebIn .36s cubic-bezier(.34,1.56,.64,1) both}
    .spin{animation:spin .7s linear infinite}
    .float{animation:float 3s ease-in-out infinite}
    .glow{animation:glow 2.5s ease-in-out infinite}
    .pr{animation:pr 2s ease-in-out infinite}
    .npop{animation:npop .42s cubic-bezier(.34,1.56,.64,1) both}
    .card-hover{transition:transform .15s ease}
    .card-hover:active{transform:scale(.985)}
    .inp{transition:border-color .2s,box-shadow .2s}
    .inp:focus{border-color:rgba(10,132,255,.5)!important;box-shadow:0 0 0 3px rgba(10,132,255,.1)!important}
    .tog{transition:background .2s}
  </style>
</head>
<body>
<div class="bg-canvas"><div class="orb o1"/><div class="orb o2"/><div class="orb o3"/></div>
<div id="root" style="position:relative;z-index:1"></div>
<script type="text/babel">
const{useState,useEffect,useCallback,useMemo,useRef}=React;

/* ── Settings ──────────────────────────────────────────────────────────── */
const DEF_CFG={temSocio:true,socioNome:'Sócio',socioPct:30,taxaAtraso:0};
const loadCfg=()=>{try{return{...DEF_CFG,...JSON.parse(localStorage.getItem('bpx_cfg')||'{}')};}catch{return{...DEF_CFG};}};
const saveCfg=c=>localStorage.setItem('bpx_cfg',JSON.stringify(c));

/* ── Helpers ────────────────────────────────────────────────────────────── */
const R$=v=>new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}).format(v||0);
const uid=()=>Math.random().toString(36).slice(2)+Date.now().toString(36);
const today=()=>new Date().toISOString().slice(0,10);
const daysLeft=d=>d?Math.ceil((new Date(d+'T00:00:00')-new Date().setHours(0,0,0,0))/86400000):0;
const daysDiff=(a,b)=>a&&b?Math.ceil((new Date(b+'T00:00:00')-new Date(a+'T00:00:00'))/86400000):0;
const addDays=(d,n)=>{const dt=new Date(d+'T00:00:00');dt.setDate(dt.getDate()+n);return dt.toISOString().slice(0,10);};
const fmtCPF=v=>{const d=v.replace(/\D/g,'').slice(0,11);if(d.length<=3)return d;if(d.length<=6)return`${d.slice(0,3)}.${d.slice(3)}`;if(d.length<=9)return`${d.slice(0,3)}.${d.slice(3,6)}.${d.slice(6)}`;return`${d.slice(0,3)}.${d.slice(3,6)}.${d.slice(6,9)}-${d.slice(9)}`;};
const fmtPhone=v=>{const d=v.replace(/\D/g,'').slice(0,11);if(!d.length)return'';if(d.length<=2)return`(${d}`;if(d.length<=6)return`(${d.slice(0,2)}) ${d.slice(2)}`;if(d.length<=10)return`(${d.slice(0,2)}) ${d.slice(2,6)}-${d.slice(6)}`;return`(${d.slice(0,2)}) ${d.slice(2,7)}-${d.slice(7)}`;};
const exportCSV=rows=>{if(!rows.length)return;const h='Nome,CPF,Emprestado,Retorno,Taxa,Inicio,Vencimento,Status,Pedaladas';const b=rows.map(c=>`"${c.nome}","${c.cpf}",${c.valorEmprestado},${c.valorRetorno},${c.taxaServico}%,${c.dataInicio},${c.dataVencimento},"${c.pago?'Pago':'Ativo'}",${c.pedaladas||0}`).join('\n');const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(h+'\n'+b);a.download='contratos.csv';a.click();};
const validateCPF=cpf=>{const d=cpf.replace(/\D/g,'');if(d.length!==11||/^(\d)\1+$/.test(d))return false;let s=0;for(let i=0;i<9;i++)s+=+d[i]*(10-i);let r=(s*10)%11;if(r>=10)r=0;if(r!==+d[9])return false;s=0;for(let i=0;i<10;i++)s+=+d[i]*(11-i);r=(s*10)%11;if(r>=10)r=0;return r===+d[10];};

const calcFin=(c,cfg)=>{
  const lucro=(c.valorRetorno||0)-(c.valorEmprestado||0)+(c.jurosAtraso||0);
  const pct=cfg?.temSocio?(cfg.socioPct||0):0;
  const socio=lucro*(pct/100);
  return{lucro,socio,liquido:lucro-socio};
};
const calcJurosAtraso=(c,cfg)=>{
  const taxa=(cfg?.taxaAtraso||0)/100;
  if(!taxa)return 0;
  const dias=Math.max(0,-daysLeft(c.dataVencimento));
  return(c.valorRetorno||0)*taxa*dias;
};

/* ── API ────────────────────────────────────────────────────────────────── */
const api={
  get:u=>fetch(u).then(r=>r.json()).catch(()=>({})),
  post:(u,d)=>fetch(u,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(d)}).then(r=>r.json()).catch(()=>({})),
  put:(u,d)=>fetch(u,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(d)}).then(r=>r.json()).catch(()=>({})),
  delete:u=>fetch(u,{method:'DELETE'}).then(r=>r.json()).catch(()=>({})),
};

/* ── Sound & Confetti ───────────────────────────────────────────────────── */
const playSuccess=()=>{try{const ctx=new(window.AudioContext||window.webkitAudioContext)();const play=(f,s,d,v=.28)=>{const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=f;g.gain.setValueAtTime(v,ctx.currentTime+s);g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+s+d);o.start(ctx.currentTime+s);o.stop(ctx.currentTime+s+d);};play(523,0,.12);play(659,.1,.12);play(784,.2,.15);play(1047,.32,.45,.35);}catch(e){}};
const launchConfetti=canvas=>{const ctx=canvas.getContext('2d');canvas.width=window.innerWidth;canvas.height=window.innerHeight;const cols=['#0a84ff','#30d158','#ff9f0a','#5e5ce6','#ff453a','#fff','#ffd60a'];const pts=Array.from({length:80},()=>({x:Math.random()*canvas.width,y:-16,w:Math.random()*10+4,h:Math.random()*6+3,col:cols[Math.floor(Math.random()*cols.length)],vx:(Math.random()-.5)*5,vy:Math.random()*4+2,rot:Math.random()*Math.PI*2,vr:(Math.random()-.5)*.2,op:1}));let raf;const draw=()=>{ctx.clearRect(0,0,canvas.width,canvas.height);pts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.09;p.rot+=p.vr;p.op-=.007;if(p.op<=0)return;ctx.save();ctx.globalAlpha=Math.max(0,p.op);ctx.translate(p.x,p.y);ctx.rotate(p.rot);ctx.fillStyle=p.col;ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);ctx.restore();});if(pts.some(p=>p.op>0))raf=requestAnimationFrame(draw);};raf=requestAnimationFrame(draw);return()=>cancelAnimationFrame(raf);};

/* ── Count-up ───────────────────────────────────────────────────────────── */
const useCountUp=(end,ms=900)=>{const[v,setV]=useState(0);const r=useRef(null);useEffect(()=>{if(r.current)cancelAnimationFrame(r.current);if(!end){setV(0);return;}let t0=null;const s=ts=>{if(!t0)t0=ts;const p=Math.min((ts-t0)/ms,1),e=1-Math.pow(1-p,4);setV(end*e);if(p<1)r.current=requestAnimationFrame(s);};r.current=requestAnimationFrame(s);return()=>{if(r.current)cancelAnimationFrame(r.current);};},[end]);return v;};
const AV=({value})=>{const v=useCountUp(value);return<span>{R$(v)}</span>;};

/* ── Icons ──────────────────────────────────────────────────────────────── */
const Ic=({d,size=20,stroke='currentColor',sw=1.8,fill='none'})=>(
  <svg width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke={stroke} strokeWidth={sw} strokeLinecap="round" strokeLinejoin="round">
    {typeof d==='string'?<path d={d}/>:d}
  </svg>
);
const IC={
  plus:'M12 5v14M5 12h14',
  search:<><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></>,
  edit:'M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z',
  trash:<><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></>,
  down:<><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></>,
  out:<><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></>,
  check:<><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></>,
  x:'M18 6 6 18M6 6l12 12',
  alert:<><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><circle cx="12" cy="16" r=".5" fill="currentColor" stroke="none"/></>,
  cd:'M6 9l6 6 6-6',cu:'M18 15l-6-6-6 6',
  copy:'M8 4H6a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2v-2M8 4h8l4 4v8a2 2 0 0 0-2 2M8 4v2a2 2 0 0 0 2 2h4',
  gear:<><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></>,
  cash:'M12 1v22M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6',
  clock:'M12 2a10 10 0 1 0 0 20A10 10 0 0 0 12 2zm0 5v5l4 2',
};
const WA=({size=14})=><svg width={size} height={size} viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>;

/* ── Countdown Ring ─────────────────────────────────────────────────────── */
const Countdown=({dataInicio,dataVencimento})=>{
  const days=daysLeft(dataVencimento),total=daysDiff(dataInicio,dataVencimento);
  const passed=Math.max(0,total-Math.max(0,days)),pct=total>0?Math.min(100,(passed/total)*100):0;
  const late=days<0,tod=days===0,urg=days>0&&days<=5;
  const col=late?'#ff453a':tod||urg?'#ff9f0a':'#0a84ff';
  const lbl=late?`${Math.abs(days)}d em atraso`:tod?'Vence hoje':`${days}d restantes`;
  const r=18,c=2*Math.PI*r,dash=c-(pct/100)*c;
  return(
    <div style={{display:'flex',alignItems:'center',gap:12}}>
      <div style={{position:'relative',width:46,height:46,flexShrink:0}}>
        <svg width="46" height="46" viewBox="0 0 46 46" style={{transform:'rotate(-90deg)'}}>
          <circle cx="23" cy="23" r={r} fill="none" stroke="rgba(255,255,255,.05)" strokeWidth="2.5"/>
          <circle cx="23" cy="23" r={r} fill="none" stroke={col} strokeWidth="2.5"
            strokeDasharray={c} strokeDashoffset={late?0:dash} strokeLinecap="round"
            style={{transition:'stroke-dashoffset .7s ease'}}/>
        </svg>
        <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',fontSize:late||tod?'8px':'10px',fontWeight:900,color:col,lineHeight:1,textAlign:'center'}}>
          {late?`+${Math.abs(days)}`:tod?'!':days}
        </div>
      </div>
      <div>
        <div style={{display:'inline-flex',alignItems:'center',gap:5,background:`${col}14`,border:`1px solid ${col}28`,borderRadius:99,padding:'4px 11px',fontSize:11,fontWeight:700,color:col}} className={late?'pr':''}>
          {lbl}
        </div>
        <div style={{fontSize:10,color:'#48484a',marginTop:4}}>
          {new Date(dataVencimento+'T00:00:00').toLocaleDateString('pt-BR')} · {passed}/{total} dias
        </div>
      </div>
    </div>
  );
};
const PBar=({dataInicio,dataVencimento})=>{
  const days=daysLeft(dataVencimento),total=daysDiff(dataInicio,dataVencimento);
  const passed=Math.max(0,total-Math.max(0,days)),pct=total>0?Math.min(100,(passed/total)*100):0;
  const late=days<0,col=late?'#ff453a':pct>80?'#ff9f0a':'#0a84ff';
  return<div style={{height:2,background:'rgba(255,255,255,.05)',borderRadius:99,overflow:'hidden',marginTop:8}}><div style={{height:'100%',width:`${late?100:pct}%`,background:col,borderRadius:99,transition:'width .7s ease'}}/></div>;
};

/* ── Meta Ring ──────────────────────────────────────────────────────────── */
const MetaRing=({current,meta,onClick})=>{
  const pct=meta>0?Math.min(100,(current/meta)*100):0;
  const done=pct>=100;
  const col=done?'#30d158':pct>=70?'#ff9f0a':pct>=40?'#0a84ff':'#48484a';
  const r=38,circ=2*Math.PI*r,dash=circ-(pct/100)*circ;
  return(
    <div onClick={onClick} style={{background:'#1c1c1e',border:'1px solid rgba(255,255,255,.06)',borderRadius:18,padding:'15px 18px',cursor:'pointer',display:'flex',alignItems:'center',gap:15}}>
      <div style={{position:'relative',flexShrink:0}}>
        <svg width="84" height="84" viewBox="0 0 84 84" style={{transform:'rotate(-90deg)'}}>
          <circle cx="42" cy="42" r={r} fill="none" stroke="rgba(255,255,255,.05)" strokeWidth="5"/>
          <circle cx="42" cy="42" r={r} fill="none" stroke={col} strokeWidth="5"
            strokeDasharray={circ} strokeDashoffset={meta===0?circ:dash}
            strokeLinecap="round" style={{transition:'stroke-dashoffset 1s ease,stroke .4s'}}/>
        </svg>
        <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center'}}>
          <div style={{fontSize:16,fontWeight:800,color:col,lineHeight:1}}>{Math.round(pct)}%</div>
          <div style={{fontSize:7,color:'#48484a',marginTop:2,fontWeight:700,letterSpacing:'.08em',textTransform:'uppercase'}}>META</div>
        </div>
      </div>
      <div style={{flex:1,minWidth:0}}>
        <div style={{fontSize:11,color:'#8e8e93',fontWeight:600,letterSpacing:'.04em',textTransform:'uppercase',marginBottom:3}}>Meta do Mês</div>
        <div style={{fontSize:22,fontWeight:800,color:'#fff',letterSpacing:'-.04em',lineHeight:1,marginBottom:4}}><AV value={current}/></div>
        <div style={{fontSize:11,color:'#48484a',marginBottom:8}}>de {meta>0?R$(meta):'—'} · falta {meta>0?R$(Math.max(0,meta-current)):'—'}</div>
        <span style={{display:'inline-flex',alignItems:'center',background:`${col}18`,borderRadius:99,padding:'3px 10px',fontSize:11,fontWeight:700,color:col,border:`1px solid ${col}28`}}>
          {done?'Meta atingida!':pct>=70?'Quase lá':pct>=40?'No caminho':pct>0?'Arrancando':'Toque para definir'}
        </span>
      </div>
    </div>
  );
};

/* ── Toast ──────────────────────────────────────────────────────────────── */
const Toast=({msg,type})=>{
  const c={success:'#30d158',error:'#ff453a',info:'#0a84ff'}[type]||'#0a84ff';
  return(
    <div style={{position:'fixed',bottom:100,left:'50%',transform:'translateX(-50%)',background:'rgba(28,28,30,.98)',color:'#fff',borderRadius:14,padding:'11px 18px',display:'flex',alignItems:'center',gap:9,boxShadow:'0 8px 40px rgba(0,0,0,.8)',zIndex:999,fontSize:13,fontWeight:600,whiteSpace:'nowrap',border:`1px solid ${c}30`,animation:'toastIn .25s ease-out both'}}>
      <div style={{width:6,height:6,borderRadius:'50%',background:c,flexShrink:0}}/>
      {msg}
    </div>
  );
};

/* ── Field ──────────────────────────────────────────────────────────────── */
const iS=err=>({width:'100%',background:'rgba(255,255,255,.05)',border:`1px solid ${err?'rgba(255,69,58,.4)':'rgba(255,255,255,.1)'}`,borderRadius:12,padding:'12px 13px',fontSize:15,color:'#fff',outline:'none',fontFamily:'inherit',WebkitAppearance:'none'});
const Fw=({label,err,required,children})=>(
  <div style={{marginBottom:13}}>
    <label style={{display:'block',fontSize:12,fontWeight:600,color:'#8e8e93',marginBottom:6}}>
      {label}{required&&<span style={{color:'#ff453a',marginLeft:3}}>*</span>}
    </label>
    {children}
    {err&&<div style={{color:'#ff453a',fontSize:11,marginTop:4}}>{err}</div>}
  </div>
);

/* ── Toggle ─────────────────────────────────────────────────────────────── */
const Toggle=({on,onChange})=>(
  <button onClick={()=>onChange(!on)} className="tog" style={{width:48,height:26,borderRadius:99,border:'none',cursor:'pointer',background:on?'#30d158':'#3a3a3c',position:'relative',flexShrink:0}}>
    <div style={{position:'absolute',top:2,left:on?24:2,width:22,height:22,background:'#fff',borderRadius:'50%',transition:'left .18s',boxShadow:'0 1px 4px rgba(0,0,0,.3)'}}/>
  </button>
);

/* ── Celebration Modal ──────────────────────────────────────────────────── */

/* ── Payment Modal ──────────────────────────────────────────────────────── */

                <div style={{fontSize:11,color:'#48484a',fontStyle:'italic'}}>Pedalada = pagar apenas os juros para renovar o prazo por mais 30 dias, sem quitar o capital</div>
              </button>
            ):(
              <div style={{background:'rgba(255,69,58,.05)',border:'1px solid rgba(255,69,58,.14)',borderRadius:14,padding:'14px 16px',marginBottom:9}}>
                <div style={{fontSize:13,fontWeight:700,color:'#ff453a',marginBottom:3}}>Limite de pedaladas atingido</div>

            <div style={{background:'rgba(255,159,10,.07)',border:'1px solid rgba(255,159,10,.22)',borderRadius:16,padding:18,marginBottom:16}}>
              <div style={{fontSize:12,color:'#8e8e93',marginBottom:4}}>Valor dos juros a receber agora</div>
              <div style={{fontSize:32,fontWeight:900,color:'#ff9f0a',letterSpacing:'-.04em',marginBottom:12}}>{R$(jurosBrutos)}</div>
              <div style={{fontSize:12,color:'#8e8e93',marginBottom:3}}>Novo vencimento: <strong style={{color:'#fff'}}>{new Date(novoVenc+'T00:00:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'long',year:'numeric'})}</strong></div>
              <div style={{fontSize:12,color:'#8e8e93'}}>Capital que continua devendo: <strong style={{color:'#ff9f0a'}}>{R$(contract.valorEmprestado)}</strong></div>
            </div>

            <div style={{fontSize:12,color:'#48484a',marginBottom:18,background:'rgba(255,255,255,.03)',borderRadius:12,padding:'12px 13px',lineHeight:1.65}}>
              O cliente paga <strong style={{color:'#fff'}}>{R$(jurosBrutos)}</strong> hoje e ganha mais 30 dias. No próximo vencimento, deverá novamente <strong style={{color:'#ff9f0a'}}>{R$(contract.valorRetorno)}</strong> (capital + juros). Após {maxPed} pedaladas o pagamento total se torna obrigatório.
            </div>

            <button onClick={()=>onPedalada(jurosBrutos)} style={{width:'100%',background:'#ff9f0a',border:'none',color:'#000',borderRadius:13,padding:'15px',fontSize:15,fontWeight:800,cursor:'pointer',fontFamily:'inherit',marginBottom:9}}>
              Confirmar · recebi {R$(jurosBrutos)}

    </div>
  );
};

/* ── Contract Modal ─────────────────────────────────────────────────────── */
const EMPTY={nome:'',cpf:'',telefone:'',chavePix:'',valorEmprestado:'',taxaServico:'30',dataInicio:'',dataVencimento:'',observacoes:'',maxPedaladas:'3'};
const ContractModal=({contract,cfg,onSave,onClose})=>{
  const td=today();
  const [form,setForm]=useState(()=>contract?{...contract,valorEmprestado:String(contract.valorEmprestado),taxaServico:String(contract.taxaServico),maxPedaladas:String(contract.maxPedaladas??3)}:{...EMPTY,dataInicio:td});
  const [errs,setErrs]=useState({});
  const [saving,setSaving]=useState(false);
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  const ret=useMemo(()=>(parseFloat(form.valorEmprestado)||0)*(1+(parseFloat(form.taxaServico)||0)/100),[form.valorEmprestado,form.taxaServico]);
  const lucro=ret-(parseFloat(form.valorEmprestado)||0);
  const pct=cfg?.temSocio?(cfg.socioPct||0):0;
  const socio=lucro*(pct/100);
  const liq=lucro-socio;
  const validate=()=>{
    const e={};
    if(!form.nome.trim())e.nome='Obrigatório';
    if(form.cpf.replace(/\D/g,'').length!==11)e.cpf='CPF incompleto';
    else if(!validateCPF(form.cpf))e.cpf='CPF inválido';
    if(!form.chavePix.trim())e.chavePix='Obrigatório';
    if(!form.valorEmprestado||parseFloat(form.valorEmprestado)<=0)e.valorEmprestado='Informe um valor';
    if(!form.dataInicio)e.dataInicio='Obrigatório';
    if(!form.dataVencimento)e.dataVencimento='Obrigatório';
    else if(form.dataVencimento<=form.dataInicio)e.dataVencimento='Deve ser após início';
    setErrs(e);return!Object.keys(e).length;
  };
  const submit=async e=>{
    e.preventDefault();if(!validate())return;setSaving(true);
    await onSave({
      ...(contract||{id:uid(),createdAt:new Date().toISOString(),pedaladas:0,pedaladaLog:[]}),
      ...form,
      valorEmprestado:parseFloat(form.valorEmprestado),
      taxaServico:parseFloat(form.taxaServico)||30,
      valorRetorno:ret,
      maxPedaladas:parseInt(form.maxPedaladas)||3,
    });
    setSaving(false);
  };
  return(
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.88)',backdropFilter:'blur(12px)',zIndex:50,display:'flex',alignItems:'flex-end',justifyContent:'center'}} onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="pop" style={{background:'#1c1c1e',border:'1px solid rgba(255,255,255,.08)',borderRadius:'22px 22px 0 0',width:'100%',maxWidth:480,maxHeight:'93vh',overflowY:'auto',paddingBottom:34}}>
        <div style={{width:30,height:3,background:'#3a3a3c',borderRadius:99,margin:'11px auto 0'}}/>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'16px 18px 0'}}>
          <div>
            <div style={{fontWeight:800,fontSize:19,color:'#fff',letterSpacing:'-.03em'}}>{contract?'Editar Contrato':'Novo Contrato'}</div>
            <div style={{fontSize:11,color:'#8e8e93',marginTop:3}}>Campos com * são obrigatórios</div>
          </div>
          <button onClick={onClose} style={{background:'rgba(255,255,255,.06)',border:'none',borderRadius:10,width:34,height:34,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',color:'#8e8e93'}}><Ic d={IC.x} size={14}/></button>
        </div>
        <form onSubmit={submit} style={{padding:'16px 18px 0'}}>
          <Fw label="Nome Completo" err={errs.nome} required>
            <input className="inp" style={iS(errs.nome)} value={form.nome} onChange={e=>set('nome',e.target.value)} placeholder="Ex: João Silva"/>
          </Fw>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
            <Fw label="CPF" err={errs.cpf} required><input className="inp" style={iS(errs.cpf)} value={form.cpf} onChange={e=>set('cpf',fmtCPF(e.target.value))} placeholder="000.000.000-00" maxLength={14}/></Fw>
            <Fw label="WhatsApp"><input className="inp" style={iS(false)} value={form.telefone} onChange={e=>set('telefone',fmtPhone(e.target.value))} placeholder="(00) 00000-0000" maxLength={15}/></Fw>
          </div>
          <Fw label="Chave Pix" err={errs.chavePix} required>
            <input className="inp" style={iS(errs.chavePix)} value={form.chavePix} onChange={e=>set('chavePix',e.target.value)} placeholder="CPF, e-mail, telefone ou aleatória"/>
          </Fw>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
            <Fw label="Valor (R$)" err={errs.valorEmprestado} required><input type="number" min="0.01" step="0.01" className="inp" style={iS(errs.valorEmprestado)} value={form.valorEmprestado} onChange={e=>set('valorEmprestado',e.target.value)} placeholder="0,00"/></Fw>
            <Fw label="Taxa (%)"><input type="number" min="0" max="9999" step="0.1" className="inp" style={iS(false)} value={form.taxaServico} onChange={e=>set('taxaServico',e.target.value)} placeholder="30"/></Fw>
          </div>
          {ret>0&&(
            <div style={{background:'rgba(10,132,255,.07)',border:'1px solid rgba(10,132,255,.14)',borderRadius:14,padding:14,marginBottom:13}}>
              <div style={{fontSize:10,color:'#0a84ff',fontWeight:700,letterSpacing:'.08em',textTransform:'uppercase',marginBottom:9}}>Previsão</div>
              <div style={{display:'grid',gridTemplateColumns:cfg?.temSocio?'1fr 1fr 1fr':'1fr 1fr',gap:8,textAlign:'center'}}>
                {[{l:'Retorno',v:R$(ret),c:'#0a84ff'},...(cfg?.temSocio?[{l:cfg.socioNome||'Sócio',v:R$(socio),c:'#5e5ce6'}]:[]),{l:'Seu Lucro',v:R$(liq),c:'#30d158'}].map(({l,v,c},i)=>(
                  <div key={i}><div style={{fontSize:9,color:'#48484a',textTransform:'uppercase',letterSpacing:'.05em',marginBottom:3}}>{l}</div><div style={{fontSize:15,fontWeight:800,color:c}}>{v}</div></div>
                ))}
              </div>
            </div>
          )}
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
            <Fw label="Início" err={errs.dataInicio} required><input type="date" className="inp" style={{...iS(errs.dataInicio),colorScheme:'dark'}} value={form.dataInicio} onChange={e=>set('dataInicio',e.target.value)}/></Fw>
            <Fw label="Vencimento" err={errs.dataVencimento} required><input type="date" className="inp" style={{...iS(errs.dataVencimento),colorScheme:'dark'}} value={form.dataVencimento} onChange={e=>set('dataVencimento',e.target.value)}/></Fw>
          </div>
          <Fw label="Máx. Pedaladas (0 = não permitir)">
            <input type="number" min="0" max="20" className="inp" style={iS(false)} value={form.maxPedaladas} onChange={e=>set('maxPedaladas',e.target.value)} placeholder="3"/>
          </Fw>
          <Fw label="Observações">
            <textarea rows={2} className="inp" style={{...iS(false),resize:'none'}} value={form.observacoes} onChange={e=>set('observacoes',e.target.value)} placeholder="Garantias, referências, etc."/>
          </Fw>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginTop:4}}>
            <button type="button" onClick={onClose} style={{background:'rgba(255,255,255,.06)',border:'1px solid rgba(255,255,255,.08)',color:'#8e8e93',borderRadius:13,padding:'13px',fontSize:14,fontWeight:600,cursor:'pointer',fontFamily:'inherit'}}>Cancelar</button>
            <button type="submit" disabled={saving} style={{background:'#0a84ff',border:'none',color:'#fff',borderRadius:13,padding:'13px',fontSize:14,fontWeight:700,cursor:'pointer',fontFamily:'inherit',opacity:saving?.65:1}}>{saving?'Salvando…':contract?'Salvar':'Cadastrar'}</button>
          </div>
        </form>
      </div>
    </div>
  );
};

/* ── Contract Card ──────────────────────────────────────────────────────── */

  const fin=calcFin(c,cfg);
  const isPago=!!c.pago,days=daysLeft(c.dataVencimento);

  const initials=c.nome.trim().split(' ').filter(Boolean).slice(0,2).map(w=>w[0].toUpperCase()).join('');
  const ac=isPago?'#30d158':late?'#ff453a':tod||urg?'#ff9f0a':'#0a84ff';
  const sTxt=isPago?'Pago':late?'Atrasado':tod?'Vence Hoje':'No Prazo';

    <div className="card-hover fu" style={{animationDelay:`${index*.055}s`,background:'#1c1c1e',border:'1px solid rgba(255,255,255,.06)',borderRadius:18,overflow:'hidden',marginBottom:9,borderLeft:`3px solid ${ac}`}}>
      <div style={{padding:'13px 14px 10px',display:'flex',alignItems:'center',gap:11}}>
        <div style={{width:42,height:42,borderRadius:13,flexShrink:0,background:`${ac}18`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:13,fontWeight:800,color:ac}}>{initials}</div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontWeight:700,fontSize:15,color:'#fff',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',letterSpacing:'-.02em'}}>{c.nome}</div>
          <button onClick={copyPix} style={{display:'flex',alignItems:'center',gap:4,background:'none',border:'none',cursor:'pointer',padding:0,marginTop:2}}>
            <span style={{fontSize:11,color:copied?'#30d158':'#48484a',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:155}}>{c.chavePix}</span>
            <Ic d={IC.copy} size={10} stroke={copied?'#30d158':'#48484a'}/>
          </button>
        </div>
        <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:5}}>
          <div style={{display:'inline-flex',alignItems:'center',background:`${ac}14`,border:`1px solid ${ac}26`,color:ac,borderRadius:99,padding:'4px 10px',fontSize:10,fontWeight:700,flexShrink:0}} className={late?'pr':''}>
            {sTxt}
          </div>
          {pedaladas>0&&(
            <button onClick={e=>{e.stopPropagation();setShowPedLog(p=>!p);}} style={{display:'inline-flex',alignItems:'center',gap:4,background:'rgba(255,159,10,.09)',border:'1px solid rgba(255,159,10,.22)',color:'#ff9f0a',borderRadius:99,padding:'3px 8px',fontSize:10,fontWeight:700,cursor:'pointer',fontFamily:'inherit'}}>

      {showPedLog&&pedaladas>0&&(
        <div className="fi" style={{margin:'0 12px 10px',background:'rgba(255,159,10,.05)',border:'1px solid rgba(255,159,10,.14)',borderRadius:12,padding:12}}>
          <div style={{fontSize:10,fontWeight:700,color:'#ff9f0a',letterSpacing:'.07em',textTransform:'uppercase',marginBottom:6}}>Histórico de Pedaladas</div>
          <div style={{fontSize:11,color:'#48484a',marginBottom:8,lineHeight:1.55,padding:'8px 10px',background:'rgba(255,255,255,.03)',borderRadius:8}}>
            <strong style={{color:'#ff9f0a'}}>Pedalada</strong> = cliente pagou só os juros para ganhar mais 30 dias sem quitar o capital.
          </div>

            <div key={i} style={{display:'flex',justifyContent:'space-between',padding:'5px 0',borderBottom:i<(c.pedaladaLog||[]).length-1?'1px solid rgba(255,255,255,.04)':'none'}}>

      <div style={{padding:'0 13px 11px'}}>

            <div style={{width:30,height:30,background:'rgba(48,209,88,.12)',borderRadius:9,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}><Ic d={IC.check} size={15} stroke='#30d158'/></div>
            <div><div style={{fontSize:13,fontWeight:700,color:'#30d158'}}>Pagamento Recebido</div><div style={{fontSize:10,color:'#48484a',marginTop:1}}>Lucro líquido: <span style={{color:'#30d158',fontWeight:700}}>{R$(fin.liquido)}</span></div></div>

        ):(
          <>
            <Countdown dataInicio={c.dataInicio} dataVencimento={c.dataVencimento}/>

            {jurosAtraso>0&&(
              <div style={{marginTop:7,padding:'7px 10px',background:'rgba(255,69,58,.06)',border:'1px solid rgba(255,69,58,.14)',borderRadius:9}}>
                <div style={{fontSize:10,fontWeight:700,color:'#ff453a'}}>Juros de atraso acumulados</div>
                <div style={{fontSize:13,fontWeight:800,color:'#ff453a',marginTop:1}}>{R$(jurosAtraso)}</div>
              </div>
            )}
          </>
        )}
      </div>

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',borderTop:'1px solid rgba(255,255,255,.04)',borderBottom:'1px solid rgba(255,255,255,.04)'}}>
        {[{l:'Capital',v:R$(c.valorEmprestado),col:'#8e8e93'},{l:'Retorno',v:R$(c.valorRetorno),col:'#0a84ff'},{l:'Seu Lucro',v:R$(fin.liquido),col:'#30d158'}].map(({l,v,col},i)=>(
          <div key={i} style={{padding:'10px 7px',textAlign:'center',borderLeft:i>0?'1px solid rgba(255,255,255,.04)':'none'}}>
            <div style={{fontSize:8,color:'#48484a',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:4,fontWeight:600}}>{l}</div>
            <div style={{fontSize:13,fontWeight:800,color:col}}>{v}</div>
          </div>
        ))}
      </div>

      {(cfg?.temSocio||c.observacoes)&&(
        <button onClick={()=>setOpen(o=>!o)} style={{width:'100%',background:'none',border:'none',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'space-between',padding:'8px 14px',color:'#48484a',fontFamily:'inherit'}}>
          <span style={{fontSize:10,fontWeight:700,letterSpacing:'.07em',textTransform:'uppercase'}}>Detalhes</span>
          <Ic d={open?IC.cu:IC.cd} size={12}/>

      )}
      {open&&(
        <div className="fi" style={{padding:'0 11px 11px'}}>
          {cfg?.temSocio&&(
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:7,marginBottom:c.observacoes?9:0}}>
              {[{l:'Lucro Bruto',v:R$(fin.lucro),col:'#8e8e93'},{l:cfg.socioNome||'Sócio',v:R$(fin.socio),col:'#5e5ce6'},{l:'Seu Líquido',v:R$(fin.liquido),col:'#30d158'}].map(({l,v,col},i)=>(

                  <div style={{fontSize:9,color:'#48484a',textTransform:'uppercase',letterSpacing:'.05em',marginBottom:3}}>{l}</div>
                  <div style={{fontSize:12,fontWeight:800,color:col}}>{v}</div>

      <div style={{display:'flex',borderTop:'1px solid rgba(255,255,255,.04)'}}>

          <Ic d={IC.check} size={12} stroke={isPago?'#30d158':'#8e8e93'}/>{isPago?'Pago':'Registrar'}
        </button>
        {c.telefone&&(
          <button onClick={openWA} style={{flex:.8,background:'none',border:'none',borderLeft:'1px solid rgba(255,255,255,.04)',cursor:'pointer',padding:'11px 6px',display:'flex',alignItems:'center',justifyContent:'center',color:'#25d366',fontFamily:'inherit'}}><WA size={13}/></button>
        )}
        <button onClick={()=>onEdit(c)} style={{flex:.8,background:'none',border:'none',borderLeft:'1px solid rgba(255,255,255,.04)',cursor:'pointer',padding:'11px 6px',display:'flex',alignItems:'center',justifyContent:'center',color:'#0a84ff',fontFamily:'inherit'}}><Ic d={IC.edit} size={12}/></button>
        <button onClick={()=>onDelete(c)} style={{flex:.7,background:'none',border:'none',borderLeft:'1px solid rgba(255,255,255,.04)',cursor:'pointer',padding:'11px 6px',display:'flex',alignItems:'center',justifyContent:'center',color:'#ff453a',fontFamily:'inherit'}}><Ic d={IC.trash} size={12}/></button>

/* ── App ────────────────────────────────────────────────────────────────── */
const App=()=>{
  const [user,setUser]=useState(null);
  const [contracts,setContracts]=useState([]);
  const [loading,setLoading]=useState(true);
  const [search,setSearch]=useState('');
  const [modal,setModal]=useState(null);
  const [delTgt,setDelTgt]=useState(null);
  const [filter,setFilter]=useState('all');
  const [toast,setToast]=useState(null);
  const [tab,setTab]=useState('contratos');
  const [meta,setMeta]=useState(()=>parseFloat(localStorage.getItem('bpx_meta')||'0'));
  const [metaModal,setMetaModal]=useState(false);
  const [celeb,setCeleb]=useState(null);
  const [payTgt,setPayTgt]=useState(null);
  const [settingsOpen,setSettingsOpen]=useState(false);
  const [cfg,setCfg]=useState(()=>loadCfg());

  const showToast=(msg,type='success')=>{setToast({msg,type});setTimeout(()=>setToast(null),3000);};
  const load=useCallback(async()=>{const d=await api.get('/api/contratos');setContracts(Array.isArray(d)?d:[]);},[]);

  useEffect(()=>{
    (async()=>{
      const me=await api.get('/api/me');
      if(!me.ok){window.location='/login';return;}
      setUser(me.nome);await load();setLoading(false);
    })();
  },[]);

  const handleSave=async data=>{
    const exists=contracts.find(c=>c.id===data.id);
    if(exists)await api.put(`/api/contratos/${data.id}`,data);
    else await api.post('/api/contratos',data);
    await load();setModal(null);
    if(!exists)setCeleb(data);else showToast('Contrato atualizado!');
  };
  const handleDelete=async()=>{await api.delete(`/api/contratos/${delTgt.id}`);await load();setDelTgt(null);showToast('Contrato excluído.','info');};

  const handlePagoTotal=async()=>{
    const u={...payTgt,pago:true};
    await api.put(`/api/contratos/${payTgt.id}`,u);
    await load();setPayTgt(null);showToast('Pagamento registrado!');
  };

  const handlePedalada=async valorJuros=>{
    const c=payTgt;
    const novoInicio=today(),novoVenc=addDays(novoInicio,30);
    const u={...c,dataInicio:novoInicio,dataVencimento:novoVenc,pedaladas:(c.pedaladas||0)+1,pedaladaLog:[...(c.pedaladaLog||[]),{data:novoInicio,valor:valorJuros}]};
    await api.put(`/api/contratos/${c.id}`,u);
    await load();setPayTgt(null);
    showToast(`Pedalada registrada! Vence ${new Date(novoVenc+'T00:00:00').toLocaleDateString('pt-BR')}`);
  };

  const handleSetMeta=val=>{setMeta(val);localStorage.setItem('bpx_meta',String(val));setMetaModal(false);showToast('Meta definida!');};
  const handleCfgSave=newCfg=>{setCfg(newCfg);setSettingsOpen(false);showToast('Configurações salvas!');};
  const logout=async()=>{await api.post('/api/logout',{});window.location='/login';};

  const summary=useMemo(()=>{
    const ativos=contracts.filter(c=>!c.pago),pagos=contracts.filter(c=>c.pago);
    const emGiro=ativos.reduce((s,c)=>s+c.valorEmprestado,0);
    const aReceber=ativos.reduce((s,c)=>s+c.valorRetorno,0);
    const lucroAtivo=ativos.reduce((s,c)=>s+calcFin(c,cfg).lucro,0);
    const liqAtivo=ativos.reduce((s,c)=>s+calcFin(c,cfg).liquido,0);
    const recolhido=pagos.reduce((s,c)=>s+c.valorRetorno,0);
    const jurosRecolhidos=pagos.reduce((s,c)=>s+calcFin(c,cfg).lucro,0);
    const socioRecolhido=pagos.reduce((s,c)=>s+calcFin(c,cfg).socio,0);
    const liqRecolhido=pagos.reduce((s,c)=>s+calcFin(c,cfg).liquido,0);
    const totalLiq=contracts.reduce((s,c)=>s+calcFin(c,cfg).liquido,0);
    const totalSocio=contracts.reduce((s,c)=>s+calcFin(c,cfg).socio,0);
    const late=ativos.filter(c=>daysLeft(c.dataVencimento)<0).length;
    const totalPedaladas=contracts.reduce((s,c)=>s+(c.pedaladas||0),0);
    return{emGiro,aReceber,lucroAtivo,liqAtivo,recolhido,jurosRecolhidos,socioRecolhido,liqRecolhido,totalLiq,totalSocio,late,count:contracts.length,ativoCount:ativos.length,pagoCount:pagos.length,liqPago:liqRecolhido,totalPedaladas};
  },[contracts,cfg]);

  const filtered=useMemo(()=>{
    const qr=search.toLowerCase().trim(),qd=search.replace(/\D/g,'');
    return contracts.filter(c=>{
      if(filter==='Pago'&&!c.pago)return false;
      if(filter==='Atrasado'&&(c.pago||daysLeft(c.dataVencimento)>=0))return false;
      if(filter==='Hoje'&&(c.pago||daysLeft(c.dataVencimento)!==0))return false;
      if(filter==='Prazo'&&(c.pago||daysLeft(c.dataVencimento)<=0))return false;
      if(!qr)return true;
      return c.nome.toLowerCase().includes(qr)||(qd.length>0&&c.cpf.replace(/\D/g,'').includes(qd));
    }).sort((a,b)=>{
      if(a.pago&&!b.pago)return 1;if(!a.pago&&b.pago)return-1;
      return daysLeft(a.dataVencimento)-daysLeft(b.dataVencimento);
    });
  },[contracts,search,filter]);

  if(loading)return(
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:13}}>
      <svg className="spin" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#0a84ff" strokeWidth="2.5"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83" strokeLinecap="round"/></svg>
      <div style={{fontSize:13,color:'#48484a',fontWeight:600}}>Carregando…</div>
    </div>
  );

  const fOpts=[{v:'all',l:'Todos'},{v:'Prazo',l:'No Prazo'},{v:'Hoje',l:'Hoje'},{v:'Atrasado',l:'Atrasados'},{v:'Pago',l:'Pagos'}];

  return(
    <div style={{minHeight:'100vh',maxWidth:480,margin:'0 auto'}}>

      {/* Header */}
      <div style={{position:'sticky',top:0,zIndex:30,background:'rgba(0,0,0,.92)',backdropFilter:'blur(24px)',borderBottom:'1px solid rgba(255,255,255,.06)',padding:'10px 15px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <img src="/logo.png" alt="" style={{height:32,filter:'drop-shadow(0 2px 12px rgba(10,132,255,.5))'}} className="float"/>
          <div>
            <div style={{fontWeight:800,fontSize:15,color:'#fff',letterSpacing:'-.03em',lineHeight:1.1}}>Bobo do Pix</div>
            <div style={{fontSize:10,color:'#48484a',marginTop:1}}>{summary.count} contrato{summary.count!==1?'s':''} · {summary.pagoCount} pago{summary.pagoCount!==1?'s':''}</div>
          </div>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:6}}>
          {summary.late>0&&(
            <div className="pr" style={{background:'rgba(255,69,58,.09)',border:'1px solid rgba(255,69,58,.22)',borderRadius:99,padding:'4px 9px',fontSize:11,fontWeight:700,color:'#ff453a'}}>
              {summary.late} atrasado{summary.late!==1?'s':''}
            </div>
          )}
          <button onClick={()=>setSettingsOpen(true)} style={{background:'rgba(255,255,255,.05)',border:'1px solid rgba(255,255,255,.06)',borderRadius:10,width:32,height:32,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',color:'#8e8e93'}}><Ic d={IC.gear} size={14}/></button>
          <button onClick={logout} style={{background:'rgba(255,255,255,.05)',border:'1px solid rgba(255,255,255,.06)',borderRadius:10,width:32,height:32,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',color:'#8e8e93'}}><Ic d={IC.out} size={14}/></button>
        </div>
      </div>

      {/* Tabs */}
      <div style={{display:'flex',borderBottom:'1px solid rgba(255,255,255,.05)',background:'rgba(0,0,0,.7)'}}>
        {[['contratos','Contratos'],['financeiro','Financeiro']].map(([k,l])=>(
          <button key={k} onClick={()=>setTab(k)} style={{flex:1,padding:'12px 10px',border:'none',cursor:'pointer',fontFamily:'inherit',fontSize:13,fontWeight:700,background:'transparent',color:tab===k?'#fff':'#48484a',borderBottom:tab===k?'2px solid #0a84ff':'2px solid transparent',transition:'all .15s'}}>{l}</button>
        ))}
      </div>

      {/* CONTRATOS */}
      {tab==='contratos'&&(
        <div style={{padding:'11px 11px 120px'}}>

          <div className="fu" style={{marginBottom:9}}>
            <MetaRing current={summary.liqPago} meta={meta} onClick={()=>setMetaModal(true)}/>
          </div>

          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:7,marginBottom:7}}>
            {[
              {dot:'#ff9f0a',label:'Em Giro',v:summary.emGiro,sub:`${summary.ativoCount} ativo${summary.ativoCount!==1?'s':''}`,sublabel:'A receber',subv:summary.aReceber,subc:'#0a84ff',delay:'.04s'},
              {dot:'#30d158',label:'Recolhido',v:summary.recolhido,sub:`${summary.pagoCount} pago${summary.pagoCount!==1?'s':''}`,sublabel:'Seu lucro',subv:summary.liqRecolhido,subc:'#30d158',delay:'.07s'},
            ].map(({dot,label,v,sub,sublabel,subv,subc,delay},i)=>(
              <div key={i} className="fu" style={{animationDelay:delay,background:'#1c1c1e',border:'1px solid rgba(255,255,255,.06)',borderRadius:15,padding:'13px 13px'}}>
                <div style={{display:'flex',alignItems:'center',gap:5,marginBottom:7}}>
                  <div style={{width:6,height:6,borderRadius:'50%',background:dot}}/>
                  <div style={{fontSize:9,color:dot,fontWeight:700,textTransform:'uppercase',letterSpacing:'.09em'}}>{label}</div>
                </div>
                <div style={{fontSize:18,fontWeight:800,color:'#fff',letterSpacing:'-.04em',lineHeight:1,marginBottom:2}}><AV value={v}/></div>
                <div style={{fontSize:9,color:'#48484a',marginBottom:8}}>{sub}</div>
                <div style={{paddingTop:7,borderTop:'1px solid rgba(255,255,255,.04)'}}>
                  <div style={{fontSize:8,color:'#48484a',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:2}}>{sublabel}</div>
                  <div style={{fontSize:12,fontWeight:700,color:subc}}><AV value={subv}/></div>
                </div>
              </div>
            ))}
          </div>

          {summary.totalPedaladas>0&&(
            <div className="fu" style={{animationDelay:'.09s',background:'rgba(255,159,10,.05)',border:'1px solid rgba(255,159,10,.15)',borderRadius:12,padding:'9px 13px',marginBottom:7,display:'flex',alignItems:'center',gap:8}}>
              <span style={{fontSize:15}}>🚴</span>
              <div style={{fontSize:12,color:'#8e8e93'}}><strong style={{color:'#ff9f0a'}}>{summary.totalPedaladas} pedalada{summary.totalPedaladas!==1?'s':''}</strong> — clientes pagaram só os juros</div>
            </div>
          )}

          <div style={{position:'relative',marginBottom:7}}>
            <div style={{position:'absolute',left:11,top:'50%',transform:'translateY(-50%)',color:'#48484a',pointerEvents:'none'}}><Ic d={IC.search} size={14}/></div>
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Buscar por nome ou CPF…" className="inp" style={{width:'100%',background:'rgba(255,255,255,.04)',border:'1px solid rgba(255,255,255,.06)',borderRadius:12,padding:'10px 34px 10px 36px',fontSize:14,color:'#fff',outline:'none',fontFamily:'inherit',WebkitAppearance:'none'}}/>
            {search&&<button onClick={()=>setSearch('')} style={{position:'absolute',right:10,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',cursor:'pointer',color:'#48484a'}}><Ic d={IC.x} size={13}/></button>}
          </div>

          <div style={{display:'flex',gap:5,marginBottom:11,overflowX:'auto',scrollbarWidth:'none',paddingBottom:2}}>
            {fOpts.map(({v,l})=>(
              <button key={v} onClick={()=>setFilter(v)} style={{flexShrink:0,padding:'6px 13px',borderRadius:99,border:`1px solid ${filter===v?'rgba(10,132,255,.45)':'rgba(255,255,255,.06)'}`,cursor:'pointer',fontFamily:'inherit',fontSize:12,fontWeight:700,background:filter===v?'rgba(10,132,255,.14)':'rgba(255,255,255,.02)',color:filter===v?'#0a84ff':'#48484a',transition:'all .14s'}}>{l}</button>
            ))}
            <button onClick={()=>exportCSV(filtered)} style={{flexShrink:0,padding:'6px 11px',borderRadius:99,border:'1px solid rgba(255,255,255,.06)',background:'rgba(255,255,255,.02)',color:'#48484a',cursor:'pointer',fontFamily:'inherit',fontSize:12,fontWeight:700,display:'flex',alignItems:'center',gap:4,marginLeft:'auto'}}><Ic d={IC.down} size={11}/>CSV</button>
          </div>

          {filtered.length===0?(
            <div className="fi" style={{textAlign:'center',padding:'54px 20px'}}>
              <div style={{width:50,height:50,background:'rgba(255,255,255,.04)',borderRadius:15,display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 13px'}}><Ic d={IC.search} size={20} stroke='#48484a'/></div>
              <div style={{color:'#48484a',fontSize:14,fontWeight:700,marginBottom:4}}>{search||filter!=='all'?'Nenhum resultado':'Nenhum contrato ainda'}</div>
              <div style={{color:'#3a3a3c',fontSize:12}}>{search||filter!=='all'?'Ajuste o filtro ou busca':'Toque em + para cadastrar'}</div>
            </div>
          ):filtered.map((c,i)=>(
            <ContractCard key={c.id} c={c} cfg={cfg} index={i} onEdit={c=>setModal({contract:c})} onDelete={c=>setDelTgt(c)} onPay={c=>setPayTgt(c)}/>
          ))}
        </div>
      )}

      {/* FINANCEIRO */}
      {tab==='financeiro'&&(
        <div style={{padding:'13px 11px 120px'}}>

          {[
            {dot:'#ff9f0a',label:'Capital em Giro — Risco Atual',delay:'0s',vals:[{l:'Na Rua',v:summary.emGiro,c:'#fff',big:true},{l:'A Receber',v:summary.aReceber,c:'#0a84ff',big:true}],sub:[{l:'Juros Esperados',v:summary.lucroAtivo,c:'#8e8e93'},{l:'Seu Lucro Esperado',v:summary.liqAtivo,c:'#0a84ff'}]},
            {dot:'#30d158',label:'Recolhido — Em Caixa',delay:'.05s',vals:[{l:'Total Recebido',v:summary.recolhido,c:'#fff',big:true},{l:'Juros Recolhidos',v:summary.jurosRecolhidos,c:'#30d158',big:true}],sub:[...(cfg?.temSocio?[{l:`Parte ${cfg.socioNome}`,v:summary.socioRecolhido,c:'#5e5ce6'}]:[]),{l:'Seu Líquido Real',v:summary.liqRecolhido,c:'#30d158'}]},
          ].map(({dot,label,delay,vals,sub},i)=>(
            <div key={i} className="fu" style={{animationDelay:delay,background:'#1c1c1e',border:'1px solid rgba(255,255,255,.06)',borderRadius:18,padding:16,marginBottom:9}}>
              <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:13}}>
                <div style={{width:6,height:6,borderRadius:'50%',background:dot}}/>
                <div style={{fontSize:10,color:dot,fontWeight:700,textTransform:'uppercase',letterSpacing:'.1em'}}>{label}</div>
              </div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:13,marginBottom:13}}>
                {vals.map(({l,v,c},j)=>(
                  <div key={j}><div style={{fontSize:9,color:'#8e8e93',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:3}}>{l}</div><div style={{fontSize:22,fontWeight:800,color:c,letterSpacing:'-.04em'}}><AV value={v}/></div></div>
                ))}
              </div>
              <div style={{height:1,background:'rgba(255,255,255,.05)',marginBottom:11}}/>
              <div style={{display:'grid',gridTemplateColumns:`repeat(${sub.length},1fr)`,gap:9}}>
                {sub.map(({l,v,c},j)=>(
                  <div key={j}><div style={{fontSize:9,color:'#48484a',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:3}}>{l}</div><div style={{fontSize:13,fontWeight:700,color:c}}><AV value={v}/></div></div>
                ))}
              </div>
            </div>
          ))}

          <div className="fu" style={{animationDelay:'.09s',marginBottom:9}}>
            <MetaRing current={summary.liqPago} meta={meta} onClick={()=>setMetaModal(true)}/>
          </div>

          {cfg?.temSocio&&(
            <div className="fu" style={{animationDelay:'.12s',background:'rgba(94,92,230,.07)',border:'1px solid rgba(94,92,230,.18)',borderRadius:18,padding:16,marginBottom:9}}>
              <div style={{fontSize:10,color:'#5e5ce6',fontWeight:700,textTransform:'uppercase',letterSpacing:'.09em',marginBottom:13}}>Sócio · {cfg.socioNome} ({cfg.socioPct}%)</div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:9}}>
                {[{l:'Recolhido p/ Sócio',v:summary.socioRecolhido,c:'#5e5ce6',prev:summary.totalSocio},{l:'Seu Líquido Real',v:summary.liqRecolhido,c:'#30d158',prev:summary.totalLiq}].map(({l,v,c,prev},i)=>(
                  <div key={i} style={{background:`${c}09`,borderRadius:13,padding:13}}>
                    <div style={{fontSize:9,color:'#8e8e93',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:4}}>{l}</div>
                    <div style={{fontSize:18,fontWeight:800,color:c}}><AV value={v}/></div>
                    <div style={{fontSize:9,color:'#48484a',marginTop:3}}>Previsto: {R$(prev)}</div>
                  </div>
                ))}
              </div>
            </div>
          )}

          <div style={{fontSize:10,color:'#48484a',fontWeight:700,letterSpacing:'.09em',textTransform:'uppercase',marginBottom:8}}>Por Contrato</div>
          {[...contracts].sort((a,b)=>{if(a.pago&&!b.pago)return 1;if(!a.pago&&b.pago)return-1;return daysLeft(a.dataVencimento)-daysLeft(b.dataVencimento);}).map((c,i)=>{
            const fin=calcFin(c,cfg),isPago=!!c.pago,days=daysLeft(c.dataVencimento),late=!isPago&&days<0;
            const ac=isPago?'#30d158':late?'#ff453a':'#0a84ff';
            const initials=c.nome.trim().split(' ').filter(Boolean).slice(0,2).map(w=>w[0].toUpperCase()).join('');
            return(
              <div key={c.id} className="fu" style={{animationDelay:`${i*.04}s`,background:'#1c1c1e',border:'1px solid rgba(255,255,255,.05)',borderRadius:14,marginBottom:7,overflow:'hidden',borderLeft:`3px solid ${ac}`}}>
                <div style={{padding:'11px 13px',display:'flex',alignItems:'center',gap:9}}>
                  <div style={{width:34,height:34,borderRadius:10,background:`${ac}18`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:800,color:ac,flexShrink:0}}>{initials}</div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontWeight:700,fontSize:13,color:'#fff',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{c.nome}</div>
                    <div style={{fontSize:10,color:'#48484a',marginTop:1}}>{isPago?'Pago':late?`${Math.abs(days)}d atraso`:days===0?'Vence hoje':`${days}d`} · {new Date(c.dataVencimento+'T00:00:00').toLocaleDateString('pt-BR')}{(c.pedaladas||0)>0?` · 🚴 ${c.pedaladas}`:''}</div>
                  </div>
                  <div style={{textAlign:'right'}}>
                    <div style={{fontSize:9,color:'#48484a',marginBottom:1}}>Capital</div>
                    <div style={{fontSize:12,fontWeight:700,color:'#8e8e93'}}>{R$(c.valorEmprestado)}</div>
                  </div>
                </div>
                <div style={{display:'grid',gridTemplateColumns:cfg?.temSocio?'1fr 1fr 1fr':'1fr 1fr',borderTop:'1px solid rgba(255,255,255,.04)'}}>
                  {[{l:'Lucro Bruto',v:R$(fin.lucro),c:'#8e8e93'},...(cfg?.temSocio?[{l:cfg.socioNome,v:R$(fin.socio),c:'#5e5ce6'}]:[]),{l:'Líquido',v:R$(fin.liquido),c:'#30d158'}].map(({l,v,c},j)=>(
                    <div key={j} style={{padding:'8px 7px',textAlign:'center',borderLeft:j>0?'1px solid rgba(255,255,255,.04)':'none'}}>
                      <div style={{fontSize:8,color:'#48484a',textTransform:'uppercase',letterSpacing:'.05em',marginBottom:2}}>{l}</div>
                      <div style={{fontSize:12,fontWeight:700,color:c}}>{v}</div>
                    </div>
                  ))}
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* FAB */}
      <button onClick={()=>setModal('add')} className="glow" style={{position:'fixed',bottom:24,right:17,width:56,height:56,borderRadius:'50%',background:'#0a84ff',border:'none',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:'0 6px 28px rgba(10,132,255,.6)',color:'#fff',zIndex:40}}>
        <Ic d={IC.plus} size={22} sw={2.5}/>
      </button>

      {(modal==='add'||modal?.contract)&&<ContractModal contract={modal?.contract||null} cfg={cfg} onSave={handleSave} onClose={()=>setModal(null)}/>}
      {delTgt&&<DelModal name={delTgt.nome} onConfirm={handleDelete} onClose={()=>setDelTgt(null)}/>}
      {metaModal&&<MetaModal current={meta} onSave={handleSetMeta} onClose={()=>setMetaModal(false)}/>}
      {payTgt&&<PaymentModal contract={payTgt} cfg={cfg} onPagoTotal={handlePagoTotal} onPedalada={handlePedalada} onClose={()=>setPayTgt(null)}/>}
      {settingsOpen&&<SettingsModal onSave={handleCfgSave} onClose={()=>setSettingsOpen(false)}/>}
      {celeb&&<CelebrationModal contract={celeb} cfg={cfg} onClose={()=>{setCeleb(null);showToast('Contrato cadastrado!');}}/>}
      {toast&&<Toast msg={toast.msg} type={toast.type}/>}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
