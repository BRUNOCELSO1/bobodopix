<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
  <title>Bobo do Pix 💰</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;font-family:'Inter',sans-serif;-webkit-tap-highlight-color:transparent}
    html,body{background:#080a10;color:#f1f5f9;margin:0;min-height:100%}

    .bg-orbs{position:fixed;inset:0;overflow:hidden;pointer-events:none;z-index:0}
    .orb{position:absolute;border-radius:50%;filter:blur(90px);opacity:.12}
    .orb1{width:550px;height:550px;background:radial-gradient(circle,#4a6fa5,transparent);top:-180px;left:-120px;animation:orb1 14s ease-in-out infinite}
    .orb2{width:420px;height:420px;background:radial-gradient(circle,#7c3aed,transparent);bottom:-120px;right:-120px;animation:orb2 17s ease-in-out infinite}
    .orb3{width:320px;height:320px;background:radial-gradient(circle,#059669,transparent);top:45%;left:40%;animation:orb3 11s ease-in-out infinite}

    @keyframes orb1{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(70px,-50px) scale(1.1)}66%{transform:translate(-40px,60px) scale(.9)}}
    @keyframes orb2{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(-60px,40px) scale(1.15)}66%{transform:translate(50px,-70px) scale(.92)}}
    @keyframes orb3{0%,100%{transform:translate(-50%,-50%) scale(1)}50%{transform:translate(-50%,-50%) scale(1.35)}}

    ::-webkit-scrollbar{width:3px;height:3px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:#2e3550;border-radius:99px}

    @keyframes fadeUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    @keyframes slideDown{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
    @keyframes modalIn{from{opacity:0;transform:scale(.95) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes pulseRing{0%{box-shadow:0 0 0 0 rgba(239,68,68,.5)}70%{box-shadow:0 0 0 10px rgba(239,68,68,0)}100%{box-shadow:0 0 0 0 rgba(239,68,68,0)}}
    @keyframes toast{from{opacity:0;transform:translateY(22px) scale(.93)}to{opacity:1;transform:translateY(0) scale(1)}}
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
    @keyframes glow{0%,100%{box-shadow:0 0 24px rgba(74,111,165,.2)}50%{box-shadow:0 0 48px rgba(74,111,165,.45)}}
    @keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}

    .fade-up{animation:fadeUp .4s ease-out both}
    .fade-in{animation:fadeIn .35s ease-out both}
    .slide-down{animation:slideDown .22s ease-out both}
    .modal-in{animation:modalIn .26s cubic-bezier(.34,1.56,.64,1) both}
    .spin{animation:spin .8s linear infinite}
    .pulse{animation:pulseRing 2s ease-in-out infinite}
    .float-anim{animation:float 3.5s ease-in-out infinite}
    .glow-anim{animation:glow 3s ease-in-out infinite}

    .contract-card{transition:transform .2s ease,box-shadow .2s ease}
    .contract-card:active{transform:scale(.99)}

    input[type="date"]::-webkit-calendar-picker-indicator{filter:invert(.4);cursor:pointer}
  </style>
</head>
<body>
<div class="bg-orbs">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
</div>
<div id="root" style="position:relative;z-index:1"></div>

<script type="text/babel">
const { useState, useEffect, useMemo, useCallback, useRef } = React;

/* ── API ── */
const api = {
  get:    p     => fetch(p).then(r=>r.json()),
  post:   (p,b) => fetch(p,{method:'POST',  headers:{'Content-Type':'application/json'},body:JSON.stringify(b)}).then(r=>r.json()),
  put:    (p,b) => fetch(p,{method:'PUT',   headers:{'Content-Type':'application/json'},body:JSON.stringify(b)}).then(r=>r.json()),
  delete: p     => fetch(p,{method:'DELETE'}).then(r=>r.json()),
};

/* ── Config ── */
const SOCIO_NOME = 'Vinicius';
const SOCIO_PCT  = 0.30;

const calcFin = c => {
  const lucro   = c.valorRetorno - c.valorEmprestado;
  const socio   = lucro * SOCIO_PCT;
  const liquido = lucro * (1 - SOCIO_PCT);
  return { lucro, socio, liquido };
};

/* ── Date helpers ── */
const today     = () => { const d = new Date(); d.setHours(0,0,0,0); return d; };
const parseDate = s  => new Date(s + 'T00:00:00');
const daysLeft  = v  => Math.round((parseDate(v) - today()) / 86400000);
const daysDiff  = (a,b) => Math.round((parseDate(b) - parseDate(a)) / 86400000);
const getStatus = (venc, pago) => {
  if (pago) return 'Pago';
  const d = daysLeft(venc);
  if (d < 0)  return 'Atrasado';
  if (d === 0) return 'Vence Hoje';
  return 'No Prazo';
};

/* ── Formatters ── */
const R$     = v => new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}).format(v||0);
const uid    = () => Math.random().toString(36).slice(2,9) + Date.now().toString(36);
const fmtCPF = v => {
  const d = v.replace(/\D/g,'').slice(0,11);
  if(d.length<=3) return d;
  if(d.length<=6) return `${d.slice(0,3)}.${d.slice(3)}`;
  if(d.length<=9) return `${d.slice(0,3)}.${d.slice(3,6)}.${d.slice(6)}`;
  return `${d.slice(0,3)}.${d.slice(3,6)}.${d.slice(6,9)}-${d.slice(9)}`;
};
const fmtPhone = v => {
  const d = v.replace(/\D/g,'').slice(0,11);
  if(!d.length) return '';
  if(d.length<=2)  return `(${d}`;
  if(d.length<=6)  return `(${d.slice(0,2)}) ${d.slice(2)}`;
  if(d.length<=10) return `(${d.slice(0,2)}) ${d.slice(2,6)}-${d.slice(6)}`;
  return `(${d.slice(0,2)}) ${d.slice(2,7)}-${d.slice(7)}`;
};
const validateCPF = cpf => {
  const d = cpf.replace(/\D/g,'');
  if(d.length!==11||/^(\d)\1+$/.test(d)) return false;
  let s=0; for(let i=0;i<9;i++) s+=+d[i]*(10-i);
  let r=(s*10)%11; if(r>=10)r=0; if(r!==+d[9]) return false;
  s=0; for(let i=0;i<10;i++) s+=+d[i]*(11-i);
  r=(s*10)%11; if(r>=10)r=0; return r===+d[10];
};

/* ── Count-up hook ── */
const useCountUp = (end, duration=1300) => {
  const [val, setVal] = useState(0);
  const raf = useRef(null);
  useEffect(() => {
    if (raf.current) cancelAnimationFrame(raf.current);
    if (!end) { setVal(0); return; }
    let startTime = null;
    const step = ts => {
      if (!startTime) startTime = ts;
      const prog = Math.min((ts - startTime) / duration, 1);
      const ease = 1 - Math.pow(1 - prog, 4);
      setVal(end * ease);
      if (prog < 1) raf.current = requestAnimationFrame(step);
    };
    raf.current = requestAnimationFrame(step);
    return () => { if (raf.current) cancelAnimationFrame(raf.current); };
  }, [end]);
  return val;
};

const AnimVal = ({ value }) => {
  const v = useCountUp(value);
  return <span>{new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}).format(v)}</span>;
};

/* ── Export CSV ── */
const exportCSV = rows => {
  const hdr = ['Nome','CPF','Chave Pix','Emprestado','Taxa%','Retorno','Lucro Bruto','Vinicius','Seu Liquido','Inicio','Vencimento','Dias Restantes','Status','Pago'];
  const body = rows.map(c => {
    const f = calcFin(c);
    return [c.nome,c.cpf,c.chavePix,c.valorEmprestado.toFixed(2),c.taxaServico,
      c.valorRetorno.toFixed(2),f.lucro.toFixed(2),f.socio.toFixed(2),f.liquido.toFixed(2),
      c.dataInicio,c.dataVencimento,daysLeft(c.dataVencimento),getStatus(c.dataVencimento,c.pago),c.pago?'Sim':'Não'];
  });
  const csv = '\uFEFF'+[hdr,...body].map(r=>r.map(v=>`"${v}"`).join(',')).join('\r\n');
  const url = URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'}));
  Object.assign(document.createElement('a'),{href:url,download:`bobo_pix_${new Date().toISOString().slice(0,10)}.csv`}).click();
  URL.revokeObjectURL(url);
};

/* ── Icons ── */
const Icon = ({ d, size=20, stroke='currentColor', sw=1.8, fill='none' }) => (

    {typeof d === 'string' ? <path d={d}/> : d}

);

  download: <><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></>,
  logout:   <><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></>,
  check:    <><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></>,
  x:        'M18 6 6 18M6 6l12 12',
  alert:    <><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><circle cx="12" cy="16" r=".5" fill="currentColor" stroke="none"/></>,
  chevdown: 'M6 9l6 6 6-6',
  chevup:   'M18 15l-6-6-6 6',
  person:   <><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></>,
};

const WA = ({ size=16 }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="currentColor">
    <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
  </svg>
);

/* ── Countdown ── */
const Countdown = ({ dataInicio, dataVencimento }) => {
  const days   = daysLeft(dataVencimento);
  const total  = daysDiff(dataInicio, dataVencimento);
  const passed = Math.max(0, total - Math.max(0, days));
  const pct    = total > 0 ? Math.min(100, (passed / total) * 100) : 0;
  const isLate   = days < 0;
  const isToday  = days === 0;
  const isUrgent = days > 0 && days <= 5;

  const color = isLate ? '#ef4444' : isToday ? '#f59e0b' : isUrgent ? '#f97316' : '#4a6fa5';
  const bg    = isLate ? 'rgba(239,68,68,.1)' : isToday ? 'rgba(245,158,11,.1)' : isUrgent ? 'rgba(249,115,22,.1)' : 'rgba(74,111,165,.08)';
  const ring  = isLate ? 'rgba(239,68,68,.3)' : isToday ? 'rgba(245,158,11,.3)' : isUrgent ? 'rgba(249,115,22,.3)' : 'rgba(74,111,165,.2)';
  const emoji = isLate ? '🔴' : isToday ? '🟡' : isUrgent ? '🟠' : '🟢';
  const label = isLate ? `${Math.abs(days)}d atrasado` : isToday ? 'Vence hoje!' : `${days}d restantes`;

  const r = 18, circ = 2 * Math.PI * r;
  const dash = circ - (pct / 100) * circ;

  return (
    <div style={{display:'flex',alignItems:'center',gap:10}}>
      <div style={{position:'relative',width:52,height:52,flexShrink:0}}>
        <svg width="52" height="52" viewBox="0 0 52 52" style={{transform:'rotate(-90deg)'}}>
          <circle cx="26" cy="26" r={r} fill="none" stroke="rgba(255,255,255,.04)" strokeWidth="3"/>
          <circle cx="26" cy="26" r={r} fill="none" stroke={color} strokeWidth="3"
            strokeDasharray={circ} strokeDashoffset={isLate ? 0 : dash}
            strokeLinecap="round" style={{transition:'stroke-dashoffset .6s ease'}}/>
        </svg>
        <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',fontSize:isLate||isToday?'9px':'11px',fontWeight:900,color,lineHeight:1,textAlign:'center'}}>
          {isLate ? `+${Math.abs(days)}` : isToday ? '!!!' : days}
        </div>
      </div>
      <div>
        <div style={{display:'inline-flex',alignItems:'center',gap:5,background:bg,border:`1px solid ${ring}`,borderRadius:'999px',padding:'4px 12px',fontSize:'12px',fontWeight:700,color}} className={isLate?'pulse':''}>
          <span style={{fontSize:10}}>{emoji}</span>{label}
        </div>
        <div style={{fontSize:'10px',color:'#374151',marginTop:'3px',paddingLeft:'2px'}}>
          {new Date(dataVencimento+'T00:00:00').toLocaleDateString('pt-BR')} &bull; {passed}/{total} dias
        </div>
      </div>
    </div>
  );
};

/* ── Progress Bar ── */
const ProgressBar = ({ dataInicio, dataVencimento }) => {
  const days   = daysLeft(dataVencimento);
  const total  = daysDiff(dataInicio, dataVencimento);
  const passed = Math.max(0, total - Math.max(0, days));
  const pct    = total > 0 ? Math.min(100, (passed / total) * 100) : 0;
  const isLate = days < 0;
  const color  = isLate ? '#ef4444' : pct > 80 ? '#f97316' : pct > 60 ? '#f59e0b' : '#4a6fa5';
  return (
    <div style={{width:'100%',height:3,background:'rgba(255,255,255,.04)',borderRadius:99,overflow:'hidden',marginTop:6}}>
      <div style={{height:'100%',width:`${isLate?100:pct}%`,background:`linear-gradient(90deg,${color},${color}88)`,borderRadius:99,transition:'width .7s ease'}}/>
    </div>
  );
};

/* ── Meta Ring ── */
const MetaRing = ({ current, meta, onClick }) => {
  const pct        = meta > 0 ? Math.min(100, (current / meta) * 100) : 0;
  const isAchieved = pct >= 100;
  const color      = isAchieved ? '#10b981' : pct >= 70 ? '#f59e0b' : pct >= 40 ? '#4a6fa5' : '#4b5563';
  const r = 44, circ = 2 * Math.PI * r;
  const dash = circ - (pct / 100) * circ;
  const motivation = isAchieved ? '🏆 Meta atingida! Parabéns!' : pct >= 70 ? '🔥 Quase lá, vai!' : pct >= 40 ? '💪 No caminho certo!' : pct > 0 ? '🚀 Começando bem!' : '🎯 Toque para definir sua meta';

  return (
    <div onClick={onClick} style={{
      background:'linear-gradient(135deg,rgba(74,111,165,.1),rgba(29,58,110,.06))',
      border:`1px solid ${isAchieved?'rgba(16,185,129,.35)':'rgba(74,111,165,.18)'}`,
      borderRadius:22,padding:'16px 18px',cursor:'pointer',
      display:'flex',alignItems:'center',gap:16,
      boxShadow: isAchieved ? '0 0 40px rgba(16,185,129,.12)' : 'none',
      transition:'all .25s ease',
    }} className={isAchieved?'glow-anim':''}>
      <div style={{position:'relative',flexShrink:0}}>
        <svg width="100" height="100" viewBox="0 0 100 100" style={{transform:'rotate(-90deg)'}}>
          <circle cx="50" cy="50" r={r} fill="none" stroke="rgba(255,255,255,.04)" strokeWidth="7"/>
          <circle cx="50" cy="50" r={r} fill="none" stroke={color} strokeWidth="7"
            strokeDasharray={circ} strokeDashoffset={meta === 0 ? circ : dash}
            strokeLinecap="round" style={{transition:'stroke-dashoffset .9s ease, stroke .4s'}}/>
        </svg>
        <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center'}}>
          <div style={{fontSize:20,fontWeight:900,color,lineHeight:1}}>{Math.round(pct)}%</div>
          <div style={{fontSize:8,color:'#4b5563',marginTop:2,fontWeight:700,letterSpacing:'.05em'}}>DA META</div>
        </div>
      </div>
      <div style={{flex:1,minWidth:0}}>
        <div style={{fontSize:10,color:'#4b5563',fontWeight:700,textTransform:'uppercase',letterSpacing:'.08em',marginBottom:5}}>🎯 Meta do Mês</div>
        <div style={{fontSize:22,fontWeight:900,color:'#f1f5f9',letterSpacing:'-.02em',lineHeight:1,marginBottom:4}}>
          <AnimVal value={current}/>
        </div>
        <div style={{fontSize:11,color:'#374151',marginBottom:8}}>
          de {meta > 0 ? R$(meta) : '—'} &bull; falta {meta > 0 ? R$(Math.max(0, meta - current)) : '—'}
        </div>
        <div style={{display:'inline-flex',alignItems:'center',gap:4,background:'rgba(255,255,255,.04)',borderRadius:99,padding:'4px 10px',fontSize:11,fontWeight:700,color,border:'1px solid rgba(255,255,255,.06)'}}>
          {motivation}
        </div>
      </div>
    </div>
  );
};

/* ── Toast ── */
const Toast = ({ msg, type }) => {
  const cfg = {
    success: { bg:'linear-gradient(135deg,#059669,#047857)', emoji:'✅' },
    error:   { bg:'linear-gradient(135deg,#dc2626,#b91c1c)', emoji:'❌' },
    info:    { bg:'linear-gradient(135deg,#1e3a5f,#1d3a6e)', emoji:'ℹ️' },
  };
  const c = cfg[type] || cfg.info;
  return (
    <div className="toast" style={{
      position:'fixed',bottom:96,left:'50%',transform:'translateX(-50%)',
      background:c.bg,color:'#fff',borderRadius:16,padding:'12px 22px',
      display:'flex',alignItems:'center',gap:10,
      boxShadow:'0 10px 40px rgba(0,0,0,.65)',zIndex:999,
      fontSize:14,fontWeight:700,whiteSpace:'nowrap',
      border:'1px solid rgba(255,255,255,.1)',
    }}>
      <span>{c.emoji}</span>{msg}
    </div>
  );
};

/* ── Input styles ── */
const iStyle = err => ({
  width:'100%',background:'rgba(8,10,16,.85)',
  border:`1.5px solid ${err?'rgba(239,68,68,.5)':'rgba(74,111,165,.2)'}`,
  borderRadius:12,padding:'11px 14px',fontSize:15,color:'#e8eaf0',
  outline:'none',fontFamily:'inherit',WebkitAppearance:'none',
  transition:'border-color .2s,box-shadow .2s',
});

const FieldWrap = ({ label, err, required, children }) => (
  <div style={{marginBottom:14}}>
    <label style={{display:'block',fontSize:11,fontWeight:700,color:'#4a6fa5',letterSpacing:'.06em',textTransform:'uppercase',marginBottom:6}}>
      {label}{required && <span style={{color:'#ef4444',marginLeft:3}}>*</span>}
    </label>
    {children}
    {err && <div style={{color:'#f87171',fontSize:11,marginTop:4,display:'flex',alignItems:'center',gap:4}}><Icon d={ICONS.alert} size={11}/>{err}</div>}
  </div>
);

/* ── Contract Modal ── */
const EMPTY = { nome:'', cpf:'', telefone:'', chavePix:'', valorEmprestado:'', taxaServico:'30', dataInicio:'', dataVencimento:'', observacoes:'' };

const ContractModal = ({ contract, onSave, onClose }) => {
  const todayStr = new Date().toISOString().slice(0,10);
  const [form, setForm] = useState(() =>
    contract
      ? { ...contract, valorEmprestado:String(contract.valorEmprestado), taxaServico:String(contract.taxaServico) }
      : { ...EMPTY, dataInicio:todayStr }
  );
  const [errs, setErrs]   = useState({});
  const [saving, setSaving] = useState(false);

  const set = (k,v) => setForm(f => ({ ...f, [k]: v }));

  const retorno = useMemo(() => (parseFloat(form.valorEmprestado)||0)*(1+(parseFloat(form.taxaServico)||0)/100), [form.valorEmprestado, form.taxaServico]);
  const lucro   = retorno - (parseFloat(form.valorEmprestado)||0);
  const socio   = lucro * SOCIO_PCT;
  const liquido = lucro * (1 - SOCIO_PCT);

  const validate = () => {
    const e = {};
    if(!form.nome.trim())                                          e.nome = 'Obrigatorio';
    if(form.cpf.replace(/\D/g,'').length!==11)                    e.cpf  = 'CPF incompleto';
    else if(!validateCPF(form.cpf))                               e.cpf  = 'CPF invalido';
    if(!form.chavePix.trim())                                     e.chavePix = 'Obrigatorio';
    if(!form.valorEmprestado||parseFloat(form.valorEmprestado)<=0) e.valorEmprestado = 'Informe um valor';
    if(!form.dataInicio)                                          e.dataInicio = 'Obrigatorio';
    if(!form.dataVencimento)                                      e.dataVencimento = 'Obrigatorio';
    else if(form.dataVencimento <= form.dataInicio)                e.dataVencimento = 'Deve ser apos inicio';
    setErrs(e);
    return !Object.keys(e).length;
  };

  const submit = async e => {
    e.preventDefault();
    if(!validate()) return;
    setSaving(true);
    await onSave({
      ...(contract || { id:uid(), createdAt:new Date().toISOString() }),
      ...form,
      valorEmprestado: parseFloat(form.valorEmprestado),
      taxaServico:     parseFloat(form.taxaServico)||30,
      valorRetorno:    retorno,
    });
    setSaving(false);
  };

  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.82)',backdropFilter:'blur(10px)',zIndex:50,display:'flex',alignItems:'flex-end',justifyContent:'center'}} onClick={e=>e.target===e.currentTarget&&onClose()}>

          </div>
          <button onClick={onClose} style={{background:'rgba(255,255,255,.05)',border:'1px solid rgba(255,255,255,.07)',borderRadius:12,width:36,height:36,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',color:'#6b7280'}}>
            <Icon d={ICONS.x} size={16}/>
          </button>
        </div>

        <form onSubmit={submit} style={{padding:'20px 20px 0'}}>
          <FieldWrap label="👤 Nome Completo" err={errs.nome} required>
            <input style={iStyle(errs.nome)} value={form.nome} onChange={e=>set('nome',e.target.value)} placeholder="Ex: Bruno Neves"/>
          </FieldWrap>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
            <FieldWrap label="CPF" err={errs.cpf} required>
              <input style={iStyle(errs.cpf)} value={form.cpf} onChange={e=>set('cpf',fmtCPF(e.target.value))} placeholder="000.000.000-00" maxLength={14}/>
            </FieldWrap>
            <FieldWrap label="📱 WhatsApp">
              <input style={iStyle(false)} value={form.telefone} onChange={e=>set('telefone',fmtPhone(e.target.value))} placeholder="(00) 00000-0000" maxLength={15}/>
            </FieldWrap>
          </div>
          <FieldWrap label="🔑 Chave Pix" err={errs.chavePix} required>
            <input style={iStyle(errs.chavePix)} value={form.chavePix} onChange={e=>set('chavePix',e.target.value)} placeholder="CPF, e-mail, telefone ou aleatória"/>
          </FieldWrap>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
            <FieldWrap label="💰 Valor Emprestado" err={errs.valorEmprestado} required>
              <input type="number" min="0.01" step="0.01" style={iStyle(errs.valorEmprestado)} value={form.valorEmprestado} onChange={e=>set('valorEmprestado',e.target.value)} placeholder="0,00"/>

const ContractCard = ({ c, onEdit, onDelete, onTogglePago, index }) => {

  const fin    = calcFin(c);
  const isPago = !!c.pago;
  const days   = daysLeft(c.dataVencimento);
  const isLate   = !isPago && days < 0;
  const isToday  = !isPago && days === 0;
  const isUrgent = !isPago && days > 0 && days <= 5;

  const initials = c.nome.trim().split(' ').filter(Boolean).slice(0,2).map(w=>w[0].toUpperCase()).join('');

  const accentColor = isPago ? '#10b981' : isLate ? '#ef4444' : isToday ? '#f59e0b' : isUrgent ? '#f97316' : '#4a6fa5';
  const statusEmoji = isPago ? '✅' : isLate ? '🔴' : isToday ? '🟡' : isUrgent ? '🟠' : '🟢';
  const statusText  = isPago ? 'Pago' : isLate ? 'Atrasado' : isToday ? 'Vence Hoje' : 'No Prazo';
  const statusBg    = isPago ? 'rgba(16,185,129,.1)' : isLate ? 'rgba(239,68,68,.1)' : isToday ? 'rgba(245,158,11,.1)' : isUrgent ? 'rgba(249,115,22,.1)' : 'rgba(74,111,165,.08)';

    if(!c.telefone) return;
    const d = c.telefone.replace(/\D/g,'');
    const br = d.startsWith('55') ? d : '55'+d;

  };

  return (
    <div className="contract-card fade-up" style={{
      animationDelay:`${index * 0.06}s`,
      background:'#0c0e16',
      border:`1px solid rgba(${isPago?'16,185,129':isLate?'239,68,68':isToday?'245,158,11':isUrgent?'249,115,22':'74,111,165'},.15)`,

      boxShadow:`0 4px 28px rgba(0,0,0,.35), 0 0 0 0 ${accentColor}`,

      {/* header row */}
      <div style={{padding:'14px 16px 10px',display:'flex',alignItems:'center',gap:12}}>

          width:46,height:46,borderRadius:14,flexShrink:0,
          background: isPago ? 'linear-gradient(135deg,#064e3b,#10b981)' : isLate ? 'linear-gradient(135deg,#7f1d1d,#ef4444)' : 'linear-gradient(135deg,#1d3a6e,#4a6fa5)',

        <div style={{flex:1,minWidth:0}}>

          <div style={{fontSize:11,color:'#374151',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',marginTop:1}}>🔑 {c.chavePix}</div>
        </div>

        <div style={{display:'flex',alignItems:'center',gap:4,background:statusBg,border:`1px solid ${accentColor}22`,color:accentColor,borderRadius:99,padding:'5px 11px',fontSize:11,fontWeight:700,flexShrink:0}} className={isLate?'pulse':''}>
          <span style={{fontSize:10}}>{statusEmoji}</span>{statusText}

      <div style={{padding:'0 16px 12px'}}>

          </div>
        ) : (
          <>

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',borderTop:'1px solid #1a1d2a',borderBottom:'1px solid #1a1d2a'}}>

              <div style={{fontSize:9,color:'#4b5563',textTransform:'uppercase',letterSpacing:'.05em',marginBottom:4}}>{l}</div>

/* ── App ── */
const App = () => {
  const [user,      setUser]      = useState(null);
  const [contracts, setContracts] = useState([]);
  const [loading,   setLoading]   = useState(true);
  const [search,    setSearch]    = useState('');
  const [modal,     setModal]     = useState(null);
  const [delTgt,    setDelTgt]    = useState(null);
  const [filter,    setFilter]    = useState('all');
  const [toast,     setToast]     = useState(null);
  const [tab,       setTab]       = useState('contratos');
  const [meta,      setMeta]      = useState(() => parseFloat(localStorage.getItem('bobopix_meta')||'0'));
  const [metaModal, setMetaModal] = useState(false);

  const showToast = (msg, type='success') => { setToast({msg,type}); setTimeout(()=>setToast(null),3200); };

  const load = useCallback(async () => {
    const data = await api.get('/api/contratos');
    setContracts(Array.isArray(data) ? data : []);
  }, []);

  useEffect(()=>{
    (async()=>{
      const me = await api.get('/api/me');
      if(!me.ok){ window.location='/login'; return; }
      setUser(me.nome);
      await load();
      setLoading(false);
    })();
  },[]);

  const handleSave = async data => {
    const exists = contracts.find(c => c.id === data.id);
    if(exists) await api.put(`/api/contratos/${data.id}`, data);
    else       await api.post('/api/contratos', data);
    await load();
    setModal(null);
    showToast(exists ? 'Contrato atualizado! ✅' : 'Contrato cadastrado! 💸');
  };

  const handleDelete = async () => {
    await api.delete(`/api/contratos/${delTgt.id}`);
    await load();
    setDelTgt(null);
    showToast('Contrato excluído.', 'info');
  };

  const handleTogglePago = async c => {
    const updated = { ...c, pago: !c.pago };
    await api.put(`/api/contratos/${c.id}`, updated);
    await load();
    showToast(updated.pago ? '💰 Pagamento recebido!' : 'Marcado como não pago.', updated.pago ? 'success' : 'info');
  };

  const handleSetMeta = val => {
    setMeta(val);
    localStorage.setItem('bobopix_meta', String(val));
    setMetaModal(false);
    showToast('🎯 Meta definida!');
  };

  const logout = async () => { await api.post('/api/logout',{}); window.location='/login'; };

  const summary = useMemo(()=>{
    const pagos    = contracts.filter(c => c.pago);
    const inv      = contracts.reduce((s,c) => s+c.valorEmprestado, 0);
    const rec      = contracts.reduce((s,c) => s+c.valorRetorno, 0);
    const lucro    = contracts.reduce((s,c) => s+calcFin(c).lucro, 0);
    const socio    = contracts.reduce((s,c) => s+calcFin(c).socio, 0);
    const liq      = contracts.reduce((s,c) => s+calcFin(c).liquido, 0);
    const liqPago  = pagos.reduce((s,c) => s+calcFin(c).liquido, 0);
    const late     = contracts.filter(c => !c.pago && daysLeft(c.dataVencimento) < 0).length;
    const hoje     = contracts.filter(c => !c.pago && daysLeft(c.dataVencimento) === 0).length;
    return { inv, rec, lucro, socio, liq, liqPago, late, hoje, count:contracts.length, pagoCount:pagos.length };
  },[contracts]);

  const filtered = useMemo(()=>{
    const q  = search.toLowerCase().replace(/\D/g,'');
    const qr = search.toLowerCase();
    return contracts
      .filter(c => {
        if(filter==='Pago'     && !c.pago) return false;
        if(filter==='Atrasado' && (c.pago || daysLeft(c.dataVencimento) >= 0)) return false;
        if(filter==='Hoje'     && (c.pago || daysLeft(c.dataVencimento) !== 0)) return false;
        if(filter==='Prazo'    && (c.pago || daysLeft(c.dataVencimento) <= 0))  return false;
        if(!search) return true;
        return c.nome.toLowerCase().includes(qr) || c.cpf.replace(/\D/g,'').includes(q);
      })
      .sort((a,b) => {
        if(a.pago && !b.pago) return 1;
        if(!a.pago && b.pago) return -1;
        return daysLeft(a.dataVencimento) - daysLeft(b.dataVencimento);
      });
  },[contracts, search, filter]);

  if(loading) return (
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:16}}>
      <div style={{fontSize:52}} className="float-anim">💰</div>
      <svg className="spin" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#4a6fa5" strokeWidth="2.5"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83" strokeLinecap="round"/></svg>
      <div style={{fontSize:13,color:'#4b5563',fontWeight:600,letterSpacing:'.05em'}}>Carregando...</div>
    </div>
  );

  const filterOptions = [
    {v:'all',     l:'Todos',      emoji:'📋'},
    {v:'Prazo',   l:'No Prazo',   emoji:'🟢'},
    {v:'Hoje',    l:'Hoje',       emoji:'🟡'},
    {v:'Atrasado',l:'Atrasados',  emoji:'🔴'},
    {v:'Pago',    l:'Pagos',      emoji:'✅'},
  ];

  return (
    <div style={{minHeight:'100vh',maxWidth:480,margin:'0 auto'}}>

      {/* Header */}
      <div style={{position:'sticky',top:0,zIndex:30,background:'rgba(8,10,16,.92)',backdropFilter:'blur(22px)',borderBottom:'1px solid rgba(255,255,255,.04)',padding:'12px 16px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <img src="/logo.png" alt="logo" style={{height:36,filter:'drop-shadow(0 2px 14px rgba(74,111,165,.55))'}} className="float-anim"/>
          <div>
            <div style={{fontWeight:900,fontSize:16,color:'#f1f5f9',letterSpacing:'-.02em'}}>Bobo do Pix 💰</div>
            <div style={{fontSize:10,color:'#374151',marginTop:1}}>
              {summary.count} contrato{summary.count!==1?'s':''} &bull; {summary.pagoCount} pago{summary.pagoCount!==1?'s':''}
            </div>
          </div>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          {summary.late > 0 && (
            <div className="pulse" style={{background:'rgba(239,68,68,.1)',border:'1px solid rgba(239,68,68,.3)',borderRadius:99,padding:'4px 10px',fontSize:11,fontWeight:700,color:'#ef4444'}}>
              🔴 {summary.late}
            </div>
          )}
          <button onClick={logout} style={{background:'rgba(255,255,255,.04)',border:'1px solid rgba(255,255,255,.06)',borderRadius:12,width:36,height:36,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',color:'#4b5563'}}>
            <Icon d={ICONS.logout} size={15}/>
          </button>
        </div>
      </div>

      {/* Tabs */}
      <div style={{display:'flex',padding:'12px 16px 0',gap:4,borderBottom:'1px solid rgba(255,255,255,.04)',background:'rgba(8,10,16,.7)'}}>
        {[['contratos','💳 Contratos'],['financeiro','📊 Financeiro']].map(([k,l]) => (
          <button key={k} onClick={()=>setTab(k)} style={{
            flex:1,padding:'10px',borderRadius:14,border:'none',cursor:'pointer',fontFamily:'inherit',fontSize:13,fontWeight:700,
            background:tab===k?'rgba(74,111,165,.15)':'transparent',
            color:tab===k?'#7aa7d4':'#4b5563',
            borderBottom:tab===k?'2px solid #4a6fa5':'2px solid transparent',
            transition:'all .2s',
          }}>{l}</button>
        ))}
      </div>

      {/* ═══ TAB CONTRATOS ═══ */}
      {tab==='contratos' && (
        <div style={{padding:'14px 14px 120px'}}>

          {/* Meta */}
          <div className="fade-up" style={{marginBottom:14}}>
            <MetaRing current={summary.liqPago} meta={meta} onClick={()=>setMetaModal(true)}/>
          </div>

          {/* Stats */}
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:14}}>
            {[
              {emoji:'💰', l:'Em Giro',   v:summary.inv, col:'#4a6fa5', delay:'0s'},
              {emoji:'📈', l:'A Receber', v:summary.rec, col:'#a78bfa', delay:'.05s'},
              {emoji:'🏆', l:'Seu Lucro', v:summary.liq, col:'#10b981', delay:'.1s'},
            ].map(({emoji,l,v,col,delay},i) => (
              <div key={i} className="fade-up" style={{animationDelay:delay,background:'#0c0e16',border:'1px solid #1a1d2a',borderRadius:16,padding:'14px 10px',textAlign:'center'}}>
                <div style={{fontSize:22,marginBottom:5}}>{emoji}</div>
                <div style={{fontSize:9,color:'#4b5563',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:4,fontWeight:700}}>{l}</div>
                <div style={{fontSize:12,fontWeight:900,color:col,letterSpacing:'-.01em',lineHeight:1.2}}>
                  <AnimVal value={v}/>
                </div>
              </div>
            ))}
          </div>

          {/* Search */}
          <div style={{position:'relative',marginBottom:10}}>
            <div style={{position:'absolute',left:13,top:'50%',transform:'translateY(-50%)',color:'#2e3550',pointerEvents:'none'}}>
              <Icon d={ICONS.search} size={15}/>
            </div>
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Buscar por nome ou CPF..."
              style={{width:'100%',background:'#0c0e16',border:'1px solid #1a1d2a',borderRadius:14,padding:'12px 38px 12px 40px',fontSize:14,color:'#f1f5f9',outline:'none',fontFamily:'inherit',WebkitAppearance:'none'}}/>
            {search && (
              <button onClick={()=>setSearch('')} style={{position:'absolute',right:12,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',cursor:'pointer',color:'#4b5563'}}>
                <Icon d={ICONS.x} size={14}/>
              </button>
            )}
          </div>

          {/* Filters */}
          <div style={{display:'flex',gap:6,marginBottom:14,overflowX:'auto',scrollbarWidth:'none',paddingBottom:2}}>
            {filterOptions.map(({v,l,emoji}) => (
              <button key={v} onClick={()=>setFilter(v)} style={{
                flexShrink:0,padding:'7px 14px',borderRadius:99,
                border:`1px solid ${filter===v?'#4a6fa5':'#1a1d2a'}`,cursor:'pointer',fontFamily:'inherit',fontSize:12,fontWeight:700,
                background:filter===v?'rgba(74,111,165,.18)':'#0c0e16',
                color:filter===v?'#7aa7d4':'#4b5563',
                transition:'all .2s',display:'flex',alignItems:'center',gap:4,
              }}>
                <span style={{fontSize:10}}>{emoji}</span>{l}
              </button>
            ))}
            <button onClick={()=>exportCSV(filtered)} style={{
              flexShrink:0,padding:'7px 14px',borderRadius:99,border:'1px solid #1a1d2a',
              background:'#0c0e16',color:'#4b5563',cursor:'pointer',fontFamily:'inherit',
              fontSize:12,fontWeight:700,display:'flex',alignItems:'center',gap:5,marginLeft:'auto',
            }}>📥 CSV</button>
          </div>

          {/* List */}
          {filtered.length === 0 ? (
            <div className="fade-in" style={{textAlign:'center',padding:'60px 20px'}}>
              <div style={{fontSize:52,marginBottom:12}}>🔍</div>
              <div style={{color:'#4b5563',fontSize:14,fontWeight:700,marginBottom:4}}>
                {search||filter!=='all' ? 'Nenhum resultado' : 'Nenhum contrato ainda 📭'}
              </div>
              <div style={{color:'#2e3550',fontSize:12}}>
                {search||filter!=='all' ? 'Ajuste o filtro ou a busca' : 'Toque em + para começar a lucrar! 💸'}
              </div>
            </div>
          ) : filtered.map((c,i) => (
            <ContractCard key={c.id} c={c} index={i} onEdit={c=>setModal({contract:c})} onDelete={c=>setDelTgt(c)} onTogglePago={handleTogglePago}/>
          ))}
        </div>
      )}

      {/* ═══ TAB FINANCEIRO ═══ */}
      {tab==='financeiro' && (
        <div style={{padding:'16px 14px 120px'}}>

          {/* Big Summary */}
          <div className="fade-up" style={{background:'linear-gradient(135deg,rgba(74,111,165,.12),rgba(29,58,110,.07))',border:'1px solid rgba(74,111,165,.2)',borderRadius:24,padding:22,marginBottom:14,position:'relative',overflow:'hidden'}}>
            <div style={{position:'absolute',top:-24,right:-16,fontSize:88,opacity:.04,pointerEvents:'none',userSelect:'none'}}>💰</div>
            <div style={{fontSize:11,color:'#4a6fa5',fontWeight:700,letterSpacing:'.08em',textTransform:'uppercase',marginBottom:16}}>📊 Resumo Geral</div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:16}}>
              <div>
                <div style={{fontSize:9,color:'#4b5563',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:4}}>💰 Capital em Giro</div>
                <div style={{fontSize:23,fontWeight:900,color:'#f1f5f9',letterSpacing:'-.03em',lineHeight:1}}><AnimVal value={summary.inv}/></div>
              </div>
              <div>
                <div style={{fontSize:9,color:'#4b5563',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:4}}>📈 Total a Receber</div>
                <div style={{fontSize:23,fontWeight:900,color:'#4a6fa5',letterSpacing:'-.03em',lineHeight:1}}><AnimVal value={summary.rec}/></div>
              </div>
            </div>
            <div style={{height:1,background:'rgba(74,111,165,.12)',marginBottom:16}}/>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10}}>
              {[
                {l:'💰 Lucro Bruto',  v:summary.lucro, col:'#6b7280'},
                {l:`🤝 ${SOCIO_NOME}`, v:summary.socio, col:'#a78bfa'},
                {l:'🏆 Seu Lucro',    v:summary.liq,   col:'#10b981'},
              ].map(({l,v,col},i) => (
                <div key={i}>
                  <div style={{fontSize:9,color:'#4b5563',textTransform:'uppercase',letterSpacing:'.05em',marginBottom:5}}>{l}</div>
                  <div style={{fontSize:15,fontWeight:900,color:col}}><AnimVal value={v}/></div>
                </div>
              ))}
            </div>
          </div>

          {/* Meta */}
          <div className="fade-up" style={{animationDelay:'.06s',marginBottom:14}}>
            <MetaRing current={summary.liqPago} meta={meta} onClick={()=>setMetaModal(true)}/>
          </div>

          {/* Partner */}
          <div className="fade-up" style={{animationDelay:'.1s',background:'rgba(167,139,250,.06)',border:'1px solid rgba(167,139,250,.2)',borderRadius:24,padding:20,marginBottom:14}}>
            <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:16}}>
              <div style={{width:46,height:46,background:'rgba(167,139,250,.15)',borderRadius:14,display:'flex',alignItems:'center',justifyContent:'center',fontSize:22}}>🤝</div>
              <div>
                <div style={{fontWeight:900,fontSize:15,color:'#f1f5f9'}}>Sócio: {SOCIO_NOME}</div>
                <div style={{fontSize:11,color:'#6b7280'}}>30% do lucro líquido de cada operação</div>
              </div>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
              <div style={{background:'rgba(167,139,250,.08)',borderRadius:16,padding:'16px'}}>
                <div style={{fontSize:9,color:'#6b7280',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:6}}>🤝 Parte do Sócio</div>
                <div style={{fontSize:22,fontWeight:900,color:'#a78bfa',letterSpacing:'-.02em'}}><AnimVal value={summary.socio}/></div>
                <div style={{fontSize:10,color:'#4b5563',marginTop:4}}>30% de {R$(summary.lucro)}</div>
              </div>
              <div style={{background:'rgba(16,185,129,.05)',borderRadius:16,padding:'16px'}}>
                <div style={{fontSize:9,color:'#6b7280',textTransform:'uppercase',letterSpacing:'.07em',marginBottom:6}}>🏆 Seu Líquido</div>
                <div style={{fontSize:22,fontWeight:900,color:'#10b981',letterSpacing:'-.02em'}}><AnimVal value={summary.liq}/></div>
                <div style={{fontSize:10,color:'#4b5563',marginTop:4}}>Após participação do sócio</div>
              </div>
            </div>
          </div>

          {/* Per contract */}
          <div style={{fontSize:11,color:'#4b5563',fontWeight:700,letterSpacing:'.07em',textTransform:'uppercase',marginBottom:10}}>📋 Por Contrato</div>
          {contracts.length === 0 && (
            <div style={{color:'#2e3550',fontSize:13,textAlign:'center',padding:'30px 0'}}>
              <div style={{fontSize:42,marginBottom:8}}>📭</div>Nenhum contrato ainda.
            </div>
          )}
          {[...contracts]
            .sort((a,b) => {
              if(a.pago && !b.pago) return 1;
              if(!a.pago && b.pago) return -1;
              return daysLeft(a.dataVencimento) - daysLeft(b.dataVencimento);
            })
            .map((c,i) => {
              const fin    = calcFin(c);
              const isPago = !!c.pago;
              const days   = daysLeft(c.dataVencimento);
              const isLate = !isPago && days < 0;
              const initials = c.nome.trim().split(' ').filter(Boolean).slice(0,2).map(w=>w[0].toUpperCase()).join('');
              return (
                <div key={c.id} className="fade-up" style={{
                  animationDelay:`${i*.04}s`,
                  background:'#0c0e16',
                  border:`1px solid ${isPago?'rgba(16,185,129,.18)':isLate?'rgba(239,68,68,.12)':'#1a1d2a'}`,
                  borderRadius:18,marginBottom:10,overflow:'hidden',
                  borderLeft:`3px solid ${isPago?'#10b981':isLate?'#ef4444':'#4a6fa5'}`,
                }}>
                  <div style={{padding:'13px 16px',display:'flex',alignItems:'center',gap:10}}>
                    <div style={{width:38,height:38,borderRadius:12,background:isPago?'linear-gradient(135deg,#064e3b,#10b981)':'linear-gradient(135deg,#1d3a6e,#4a6fa5)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:900,color:'#fff',flexShrink:0}}>{initials}</div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontWeight:800,fontSize:14,color:'#f1f5f9',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{c.nome}</div>
                      <div style={{fontSize:10,color:'#4b5563',marginTop:1}}>
                        {isPago ? '✅ Pago' : isLate ? `🔴 ${Math.abs(days)}d em atraso` : days===0 ? '🟡 Vence hoje' : `🟢 ${days}d restantes`}
                        &nbsp;&bull;&nbsp;{new Date(c.dataVencimento+'T00:00:00').toLocaleDateString('pt-BR')}
                      </div>
                    </div>
                    <div style={{textAlign:'right',flexShrink:0}}>
                      <div style={{fontSize:9,color:'#4b5563',marginBottom:2}}>Emprestado</div>
                      <div style={{fontSize:13,fontWeight:800,color:'#6b7280'}}>{R$(c.valorEmprestado)}</div>
                    </div>
                  </div>
                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',borderTop:'1px solid #1a1d2a'}}>
                    {[
                      {l:'💰 Bruto',       v:R$(fin.lucro),   col:'#6b7280', bg:'transparent'},
                      {l:`🤝 ${SOCIO_NOME}`,v:R$(fin.socio),  col:'#a78bfa', bg:'rgba(167,139,250,.04)'},
                      {l:'🏆 Líquido',     v:R$(fin.liquido), col:'#10b981', bg:'rgba(16,185,129,.04)'},
                    ].map(({l,v,col,bg},j) => (
                      <div key={j} style={{padding:'10px 8px',textAlign:'center',background:bg,borderLeft:j>0?'1px solid #1a1d2a':'none'}}>
                        <div style={{fontSize:8,color:'#374151',textTransform:'uppercase',letterSpacing:'.05em',marginBottom:3}}>{l}</div>
                        <div style={{fontSize:13,fontWeight:800,color:col}}>{v}</div>
                      </div>
                    ))}
                  </div>
                </div>
              );
            })}
        </div>
      )}

      {/* FAB */}
      <button onClick={()=>setModal('add')} style={{
        position:'fixed',bottom:28,right:20,
        width:62,height:62,borderRadius:'50%',
        background:'linear-gradient(135deg,#4a6fa5,#1d3a6e)',
        border:'none',cursor:'pointer',
        display:'flex',alignItems:'center',justifyContent:'center',
        boxShadow:'0 8px 40px rgba(29,58,110,.65), 0 2px 0 rgba(255,255,255,.12) inset',
        color:'#fff',zIndex:40,fontSize:26,
      }} className="glow-anim">
        <Icon d={ICONS.plus} size={24} sw={2.5}/>
      </button>

      {/* Modals */}
      {(modal==='add' || modal?.contract) && (
        <ContractModal contract={modal?.contract||null} onSave={handleSave} onClose={()=>setModal(null)}/>
      )}
      {delTgt && <DeleteModal name={delTgt.nome} onConfirm={handleDelete} onClose={()=>setDelTgt(null)}/>}
      {metaModal && <MetaModal current={meta} onSave={handleSetMeta} onClose={()=>setMetaModal(false)}/>}
      {toast && <Toast msg={toast.msg} type={toast.type}/>}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
