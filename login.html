<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
  <title>Bobo do Pix</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body{height:100%;width:100%;overflow:hidden}
    body{
      font-family:'Inter',sans-serif;min-height:100%;
      display:flex;align-items:center;justify-content:center;
      background:#13151c;position:relative;
    }
    body::before{
      content:'';position:fixed;inset:0;
      background:
        radial-gradient(ellipse 80% 60% at 50% -10%, rgba(74,111,165,.28) 0%, transparent 65%),
        radial-gradient(ellipse 50% 40% at 10% 80%,  rgba(29,58,110,.2)  0%, transparent 55%),
        radial-gradient(ellipse 60% 50% at 90% 90%,  rgba(74,111,165,.12) 0%, transparent 55%);
      pointer-events:none;z-index:0;
    }
    body::after{
      content:'';position:fixed;inset:0;
      background-image:
        linear-gradient(rgba(74,111,165,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(74,111,165,.04) 1px, transparent 1px);
      background-size:40px 40px;pointer-events:none;z-index:0;
    }
    .card{
      position:relative;z-index:1;
      width:100%;max-width:390px;margin:0 auto;
      padding:2.5rem 1.75rem 2rem;
      background:rgba(26,29,38,.92);
      backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
      border:1px solid rgba(74,111,165,.18);border-radius:2rem;
      box-shadow:0 0 0 1px rgba(255,255,255,.04),0 32px 80px rgba(0,0,0,.6),0 0 80px rgba(74,111,165,.08) inset;
      display:flex;flex-direction:column;align-items:center;
    }
    .logo-img{
      width:160px;
      filter:drop-shadow(0 8px 32px rgba(74,111,165,.55));
      margin-bottom:1.5rem;
      animation:float 4s ease-in-out infinite;
    }
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
    .divider{width:100%;height:1px;background:linear-gradient(90deg,transparent,rgba(74,111,165,.35),transparent);margin-bottom:1.75rem}
    .heading{text-align:center;margin-bottom:1.75rem}
    .heading h1{font-size:1.55rem;font-weight:800;color:#f1f5f9;letter-spacing:-.03em;line-height:1.15;margin-bottom:.35rem}
    .heading p{font-size:.82rem;color:#5a6480;font-weight:400;line-height:1.5}
    .fields{width:100%}
    .field{margin-bottom:1rem;width:100%}
    label{display:block;font-size:.7rem;font-weight:700;color:#4a6fa5;letter-spacing:.1em;text-transform:uppercase;margin-bottom:.55rem}
    .iw{position:relative}
    .iico{position:absolute;left:.95rem;top:50%;transform:translateY(-50%);color:#3a4460;pointer-events:none;transition:color .2s}
    .iw:focus-within .iico{color:#4a6fa5}
    input{
      width:100%;background:rgba(19,21,28,.8);border:1.5px solid rgba(74,111,165,.2);
      border-radius:1rem;padding:.85rem 1rem .85rem 2.6rem;
      font-size:1rem;color:#e8eaf0;outline:none;font-family:inherit;
      transition:border-color .2s,box-shadow .2s,background .2s;-webkit-appearance:none;
    }
    input:focus{border-color:rgba(74,111,165,.7);background:rgba(19,21,28,1);box-shadow:0 0 0 4px rgba(74,111,165,.12)}
    input::placeholder{color:#2e3550;font-size:.9rem}
    .btn{
      width:100%;background:linear-gradient(135deg,#4a6fa5 0%,#2a4f8a 50%,#1d3a6e 100%);
      color:#fff;border:none;border-radius:1rem;padding:1rem;
      font-size:1rem;font-weight:700;cursor:pointer;font-family:inherit;letter-spacing:.03em;
      margin-top:1.5rem;position:relative;overflow:hidden;
      box-shadow:0 4px 24px rgba(29,58,110,.5),0 1px 0 rgba(255,255,255,.08) inset;
      transition:transform .15s,box-shadow .15s,opacity .15s;-webkit-appearance:none;
    }
    .btn::before{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.07) 0%,transparent 100%);pointer-events:none}
    .btn:active{transform:scale(.97);box-shadow:0 2px 12px rgba(29,58,110,.4)}
    .btn:disabled{opacity:.55;cursor:not-allowed}
    .err-wrap{min-height:1.8rem;width:100%;margin-top:.75rem;display:flex;align-items:center;justify-content:center}
    .err{font-size:.8rem;color:#f87171;font-weight:500;text-align:center}
    .foot{margin-top:1.75rem;font-size:.68rem;color:#2e3550;display:flex;align-items:center;gap:.4rem;letter-spacing:.02em}
    .foot svg{flex-shrink:0;opacity:.6}
    @media(max-height:680px){
      .card{padding:1.5rem 1.5rem 1.25rem}
      .logo-img{width:110px;margin-bottom:1rem}
      .heading{margin-bottom:1.25rem}
    }
    @media(min-width:480px){.card{padding:3rem 2.5rem 2.5rem}}
  </style>
</head>
<body>
<div class="card">
  <img class="logo-img" src="logo.png" alt="Bobo do Pix"/>
  <div class="divider"></div>
  <div class="heading">
    <h1>Bem-vindo de volta</h1>
    <p>Insira suas credenciais para acessar o painel</p>
  </div>
  <div class="fields">
    <div class="field">
      <label>Usuário</label>
      <div class="iw">
        <svg class="iico" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <input id="usr" type="text" inputmode="text" placeholder="Digite seu usuário" autocomplete="username" autocorrect="off" autocapitalize="off" spellcheck="false"/>
      </div>
    </div>
    <div class="field">
      <label>Senha</label>
      <div class="iw">
        <svg class="iico" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <input id="pw" type="password" placeholder="Digite sua senha" autocomplete="current-password"/>
      </div>
    </div>
  </div>
  <button class="btn" id="btn" onclick="login()">
    <span id="btn-txt">Entrar no Painel</span>
  </button>
  <div class="err-wrap"><div class="err" id="err"></div></div>
  <div class="foot">
    <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
    Acesso seguro &mdash; dados salvos no servidor
  </div>
</div>
<script>
  document.getElementById('pw').addEventListener('keydown', e => { if(e.key==='Enter') login(); });
  document.getElementById('usr').addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('pw').focus(); });
  async function login() {
    const btn=document.getElementById('btn'), txt=document.getElementById('btn-txt'), err=document.getElementById('err');
    txt.textContent='Verificando...'; btn.disabled=true; err.textContent='';
    try {
      const r = await fetch('/api/login', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({usuario:document.getElementById('usr').value, senha:document.getElementById('pw').value})
      });
      const d = await r.json();
      if(d.ok){ txt.textContent='Entrando...'; window.location='/app'; }
      else { err.textContent=d.msg||'Usuário ou senha incorretos'; txt.textContent='Entrar no Painel'; btn.disabled=false; }
    } catch(e) {
      err.textContent='Erro de conexão. Tente novamente.'; txt.textContent='Entrar no Painel'; btn.disabled=false;
    }
  }
</script>
</body>
</html>
